<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>कालीबंगा सभ्यता - SST Pro</title>
    <style>
        :root {
            --primary: #e67e22;
            --dark: #2c3e50;
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        /* Header Design */
        .header { background: linear-gradient(135deg, #d35400, #e67e22); color: white; padding: 30px 20px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        .back-btn { position: absolute; left: 20px; top: 30px; color: white; text-decoration: none; font-size: 20px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 50%; }
        .header h1 { margin: 10px 0 5px; font-size: 28px; }
        
        .container { padding: 20px; max-width: 600px; margin: auto; }

        /* Video Card */
        .video-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-top: -50px; border: 1px solid rgba(255,255,255,0.3); }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-info { padding: 15px; text-align: center; background: #fff; }
        .video-info h3 { margin: 0; color: var(--dark); font-size: 18px; }

        /* Quick Notes Section */
        .notes-section { margin-top: 25px; }
        .section-title { font-size: 18px; font-weight: bold; color: var(--dark); margin-bottom: 15px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: var(--primary); margin-right: 10px; border-radius: 2px; }

        .fact-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: flex-start; }
        .fact-icon { background: #fff5eb; color: var(--primary); padding: 10px; border-radius: 12px; margin-right: 15px; font-size: 18px; }
        .fact-text b { color: var(--primary); display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<div class="header">
    <a href="raj-history.html" class="back-btn">←</a>
    <h1>कालीबंगा सभ्यता</h1>
    <p>प्राचीन राजस्थान का गौरव</p>
</div>

<div class="container">
    <div class="video-card">
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLZfYnCy_QrOwEbckewQqQLNk8miA9L5ll" allowfullscreen></iframe>
        </div>
        <div class="video-info">
            <h3>🎬 वीडियो क्लास देखें</h3>
        </div>
    </div>

    <div class="notes-section">
        <div class="section-title">महत्वपूर्ण तथ्य</div>
        
        <div class="fact-card">
            <div class="fact-icon">📍</div>
            <div class="fact-text"><b>स्थान</b>हनुमानगढ़ जिला (घग्घर नदी के किनारे)</div>
        </div>

        <div class="fact-card">
            <div class="fact-icon">🔍</div>
            <div class="fact-text"><b>खोजकर्ता</b>अमलानंद घोष (वर्ष 1952)</div>
        </div>

        <div class="fact-card">
            <div class="fact-icon">🏺</div>
            <div class="fact-text"><b>शाब्दिक अर्थ</b>काले रंग की कांच की चूड़ियाँ</div>
        </div>

        <div class="fact-card">
            <div class="fact-icon">🧱</div>
            <div class="fact-text"><b>विशेष साक्ष्य</b>जूते हुए खेत, भूकंप के प्रमाण, सात अग्नि वेदिकाएँ।</div>
        </div>
    </div>
</div>

</body>
</html>
