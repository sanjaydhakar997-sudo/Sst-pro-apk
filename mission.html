<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Royal Library</title>
    <style>
        :root { --gold: #ffd700; --dark: #1a1a2e; --white: #ffffff; --royal-blue: #003366; }
        body { background-color: #fdfae5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .lib-header {
            background: linear-gradient(180deg, var(--dark) 0%, #000 100%);
            padding: 50px 20px; text-align: center; border-bottom: 8px solid var(--gold); color: var(--gold);
        }

        .container { padding: 20px; max-width: 900px; margin: auto; }

        /* 🤖 Smart Assistant Box (AI Feel, SST Brand) */
        .ai-assist-box {
            background: var(--dark); color: #fff; padding: 20px; border-radius: 25px;
            margin-top: -30px; border: 3px solid var(--gold); box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .ai-title { color: var(--gold); font-weight: 900; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .ai-input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--gold); padding: 12px; border-radius: 12px; color: #fff; font-weight: 600; outline: none; }

        /* 📚 Book Shelf */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .book-card {
            background: #fff; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee;
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .book-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        .book-img { width: 100%; height: 200px; object-fit: cover; background: #f9f9f9; }
        .book-info { padding: 12px; flex-grow: 1; }
        .book-title { font-size: 16px; font-weight: 950; color: var(--dark); margin: 5px 0; }

        /* ⚡ Action Buttons */
        .action-area { display: flex; flex-direction: column; gap: 5px; padding: 10px; background: #f9f9f9; }
        
        .btn-pdf { 
            background: #e74c3c; color: #fff; text-align: center; padding: 10px; 
            text-decoration: none; font-size: 12px; font-weight: 800; border-radius: 10px;
        }
        .btn-manual { 
            background: var(--dark); color: var(--gold); text-align: center; padding: 10px; 
            text-decoration: none; font-size: 12px; font-weight: 800; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="lib-header">
        <h1 style="margin: 0; font-size: 32px; font-weight: 950;">THE ROYAL LIBRARY</h1>
        <p style="font-weight: 800; color: #fff; opacity: 0.8;">SST Pro: डिजिटल और मैनुअल भंडार 🚩</p>
    </div>

    <div class="container">
        
        <div class="ai-assist-box">
            <span class="ai-title">✨ SST स्मार्ट सहायक</span>
            <input type="text" id="aiSearch" class="ai-input" placeholder="जैसे: '10th Class' या 'History' लिखकर ढूंढें...">
        </div>

        <div class="book-grid" id="bookGrid">
            
            <div class="book-card">
                <img src="https://via.placeholder.com/200x250?text=SST+Notes" class="book-img">
                <div class="book-info">
                    <div class="book-title">राजस्थान का भूगोल</div>
                    <div style="font-size: 11px; font-weight: 700; color: #666;">कोड: #GEO-01</div>
                </div>
                
                <div class="action-area">
                    <a href="your_pdf_link.pdf" download class="btn-pdf">📥 PDF प्राप्त करें</a>
                    
                    <a href="donor_details.html?book=GEO-01" class="btn-manual">📦 डाक से मंगवाएं</a>
                </div>
            </div>

            </div>
    </div>

    <script>
        // स्मार्ट सर्च जो AI जैसा अनुभव देगा
        document.getElementById('aiSearch').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let cards = document.getElementsByClassName('book-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.book-title').innerText;
                if (title.toUpperCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
