<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - The Legacy Mission</title>
    <style>
        :root { --gold: #ffd700; --dark: #000; --royal: #1a1a2e; --white: #ffffff; }
        body { background: #fdfae5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: var(--royal); overflow-x: hidden; }
        
        /* 🚩 VVIP मेन हेडर */
        .sst-main-header {
            background: linear-gradient(180deg, var(--royal) 0%, #000 100%);
            padding: 80px 20px; text-align: center; border-bottom: 10px solid var(--gold);
            color: var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .shandar-heading { font-size: 50px; font-weight: 950; margin: 0; text-transform: uppercase; letter-spacing: -1px; }
        .legacy-tag { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--gold); padding: 8px 25px; border-radius: 50px; font-size: 14px; font-weight: 900; margin-top: 15px; display: inline-block; }

        .container { padding: 30px 20px; max-width: 650px; margin: auto; }

        /* 💎 मस्कुलर स्ट्रिप्स (बटन्स) */
        .vvip-strip {
            display: block; text-decoration: none; position: relative; margin-bottom: 35px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .vvip-strip:hover { transform: scale(1.03); }

        .gold-box {
            border-radius: 35px; padding: 35px; border: 4px solid var(--gold);
            display: flex; align-items: center; gap: 20px; overflow: hidden; position: relative;
        }

        /* 👑 सफ़रनामा (Donate) */
        .safarnama-bg { background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%); color: var(--royal); }
        /* 🛡️ Legacy Builder (Get Book) */
        .builder-bg { background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%); color: var(--gold); border-color: var(--gold); }
        /* 📚 The Library */
        .library-bg { background: linear-gradient(135deg, #003366 0%, #001a33 100%); color: #fff; border-color: var(--gold); }

        .icon-square {
            width: 75px; height: 75px; border-radius: 20px; background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 40px; flex-shrink: 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid rgba(255,255,255,0.3);
        }

        .text-content { flex-grow: 1; }
        .text-content h2 { margin: 0; font-size: 28px; font-weight: 950; text-transform: uppercase; }
        .text-content p { margin: 5px 0 0 0; font-size: 14px; font-weight: 700; opacity: 0.8; }

        .arrow-icon { font-size: 30px; font-weight: 900; }

        /* ✨ चमक वाली एनीमेशन */
        .shine {
            position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: shine-alt 4s infinite;
        }
        @keyframes shine-alt { 0% { left: -100%; } 100% { left: 200%; } }
    </style>
</head>
<body>

    <div class="sst-main-header">
        <h1 class="shandar-heading">SST PRO</h1>
        <div class="legacy-tag">THE LEGACY MISSION 🚩</div>
    </div>

    <div class="container">

        <a href="safarnama_details.html" class="vvip-strip">
            <div class="gold-box safarnama-bg">
                <div class="shine"></div>
                <div class="icon-square">🚩</div>
                <div class="text-content">
                    <h2>सफ़रनामा</h2>
                    <p>विरासत और समीक्षा की कहानी जोड़ें</p>
                </div>
                <div class="arrow-icon">❯</div>
            </div>
        </a>

        <a href="donor_details.html" class="vvip-strip">
            <div class="gold-box builder-bg">
                <div class="shine"></div>
                <div class="icon-square">🛡️</div>
                <div class="text-content">
                    <h2>Legacy Builder</h2>
                    <p>विरासत चुनें और भविष्य का निर्माण करें</p>
                </div>
                <div class="arrow-icon" style="color: var(--gold);">❯</div>
            </div>
        </a>

        <a href="library_details.html" class="vvip-strip">
            <div class="gold-box library-bg">
                <div class="shine"></div>
                <div class="icon-square">📚</div>
                <div class="text-content">
                    <h2>The Royal Library</h2>
                    <p>ज्ञान के खजाने में प्रवेश करें</p>
                </div>
                <div class="arrow-icon" style="color: var(--gold);">❯</div>
            </div>
        </a>

    </div>

    <div style="text-align: center; padding-bottom: 40px; font-weight: 800; color: #666; font-size: 14px;">
        © 2026 SST PRO | चित्तौड़गढ़, राजस्थान
    </div>

</body>
</html>
