<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - किताब कोना</title>
    <style>
        /* 1. बेस सेटअप */
        body { 
            background-color: #fdfae5; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* 2. हेडर एनीमेशन - शानदार "किताब कोना" */
        @keyframes textFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sst-main-header {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 75px 20px 65px 20px;
            text-align: center;
            border-radius: 0 0 65px 65px;
            border-bottom: 8px solid #ffd700;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .shandar-heading {
            font-size: 50px; 
            font-weight: 950;
            margin: 0;
            background: linear-gradient(to right, #ffd700, #ffffff, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 3s linear infinite;
            text-transform: uppercase;
            letter-spacing: -1px;
            filter: drop-shadow(0 5px 15px rgba(255,215,0,0.2));
        }

        /* 3. पट्टियों का कॉमन स्टाइल (VVIP Style) */
        .vvip-strip {
            text-decoration: none;
            display: block;
            margin: 25px 15px;
            transition: transform 0.2s ease;
        }
        .vvip-strip:active { transform: scale(0.96); }

        .gold-box {
            padding: 28px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 4px solid #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* चमकता हुआ एनीमेशन (Shine Effect) */
        .gold-box::after {
            content: '';
            position: absolute;
            top: -50%; left: -100%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .icon-square {
            background: #ffffff;
            width: 70px; height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            z-index: 2;
            flex-shrink: 0;
        }

        .text-content { flex-grow: 1; z-index: 2; padding-left: 5px; }
        .text-content h2 { margin: 0; font-size: 26px; font-weight: 950; letter-spacing: -0.5px; }
        .text-content p { margin: 5px 0 0 0; font-size: 13px; font-weight: 800; }
        
        .arrow-icon { font-size: 25px; font-weight: 900; z-index: 2; }
    </style>
</head>
<body>

    <div class="sst-main-header">
        <h1 class="shandar-heading">किताब कोना</h1>
        <div style="margin-top: 15px;">
            <span style="
                color: #ffd700; 
                border: 2px solid #ffd700; 
                padding: 6px 20px; 
                border-radius: 50px; 
                font-size: 13px; 
                font-weight: 900; 
                letter-spacing: 2px;
                background: rgba(255, 215, 0, 0.1);
            ">THE LEGACY 🚩</span>
        </div>
    </div>

    <a href="passport_details.html" class="vvip-strip">
        <div class="gold-box" style="background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%); box-shadow: 0 15px 35px rgba(253, 185, 49, 0.4);">
            <div class="icon-square" style="font-size: 40px;">📓</div>
            <div class="text-content">
                <h2 style="color: #1a1a2e;">सफ़रनामा</h2>
                <p style="color: #1a1a2e; opacity: 0.7;">विरासत और समीक्षा की कहानी</p>
            </div>
            <div class="arrow-icon" style="color: #1a1a2e;">❯</div>
        </div>
    </a>

    <a href="donor_details.html" class="vvip-strip">
        <div class="gold-box" style="background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%); border-color: #ffd700; box-shadow: 0 20px 45px rgba(0,0,0,0.5);">
            <div class="icon-square" style="background: linear-gradient(135deg, #ffd700, #d4ac0d); font-size: 45px;">👑</div>
            <div class="text-content">
                <h2 style="color: #ffd700; text-transform: uppercase;">Legacy Builder</h2>
                <p style="color: #ffffff; opacity: 0.9;">JOIN THE HALL OF FAME 🚩</p>
            </div>
            <div class="arrow-icon" style="color: #ffd700;">❯</div>
        </div>
    </a>

    <a href="library_details.html" class="vvip-strip">
        <div class="gold-box" style="background: linear-gradient(135deg, #002366 0%, #000080 50%, #002366 100%); border-color: #ffd700; box-shadow: 0 22px 48px rgba(0,0,128,0.4);">
            <div class="icon-square" style="background: linear-gradient(135deg, #ffd700, #d4ac0d); font-size: 45px;">📚</div>
            <div class="text-content">
                <h2 style="color: #ffd700; text-transform: uppercase;">The Royal Library</h2>
                <p style="color: #ffffff; opacity: 0.9;">ज्ञान के अंतहीन खजाने में प्रवेश करें 🚩</p>
            </div>
            <div class="arrow-icon" style="color: #ffd700;">❯</div>
        </div>
    </a>

    <div style="height: 40px;"></div>

</body>
</html>
