<style>
    /* 1. हेडर के विस्तार का धीमा एनीमेशन */
    @keyframes headerExpand {
        0% { border-radius: 0; padding: 40px 25px 30px 25px; opacity: 0; }
        100% { border-radius: 0 0 50px 50px; padding: 60px 25px 50px 25px; opacity: 1; }
    }

    /* 2. टेक्स्ट के चमकने का एनीमेशन (Light Glow) */
    @keyframes textGlow {
        0% { text-shadow: 1.5px 1.5px 0px rgba(0,0,0,0.3); color: #ffd700; }
        50% { text-shadow: 0 0 15px rgba(255,215,0,0.7); color: #ffffff; }
        100% { text-shadow: 1.5px 1.5px 0px rgba(0,0,0,0.3); color: #ffd700; }
    }
</style>

<div class="mission-header" style="
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    color: #ffffff;
    border-radius: 0 0 50px 50px; /* और भी मज़बूत और प्रीमियम गोलाई */
    padding: 60px 25px 50px 25px;
    text-align: center;
    position: relative;
    box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    border-bottom: 6px solid #ffd700; /* मज़बूत गोल्ड बॉर्डर जैसा आपकी ऐप में है */
    margin-bottom: 30px;
    animation: headerExpand 1.5s ease-out; /* 1.5 सेकंड का धीमा विस्तार */
    overflow: hidden;
">
