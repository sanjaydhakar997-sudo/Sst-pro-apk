<style>
    /* 1. एनिमेशन और फॉन्ट का प्रीमियम तालमेल */
    @keyframes textFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* 2. मुख्य हेडर - जो आपकी ऐप जैसा दिखेगा */
    .sst-main-header {
        background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        padding: 70px 20px 60px 20px;
        text-align: center;
        border-radius: 0 0 60px 60px;
        border-bottom: 8px solid #ffd700;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        position: relative;
    }

    .shandar-heading {
        font-size: 58px; /* विशाल अक्षर */
        font-weight: 900;
        margin: 0;
        /* शानदार बहता हुआ रंग (Gradient Text) */
        background: linear-gradient(to right, #ffd700, #ffffff, #ffd700);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textFlow 3s linear infinite;
        text-transform: uppercase;
        letter-spacing: -2px;
        filter: drop-shadow(0 5px 15px rgba(255,215,0,0.3));
    }

    /* 3. VVIP स्टाइल पट्टी - द बुक पासपोर्ट */
    .vvip-strip {
        text-decoration: none;
        display: block;
        margin: 30px 15px;
        transition: transform 0.2s ease;
    }

    .vvip-strip:active { transform: scale(0.95); } /* दबाने पर दबेगा */

    .gold-box {
        background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
        padding: 25px;
        border-radius: 35px;
        display: flex;
        align-items: center;
        gap: 20px;
        border: 4px solid #ffffff;
        box-shadow: 0 15px 35px rgba(253, 185, 49, 0.4);
        position: relative;
        overflow: hidden;
    }

    /* पट्टी पर शीशे जैसी चमक */
    .gold-box::after {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
        transform: rotate(45deg);
        animation: shine 4s infinite;
    }

    @keyframes shine {
        0% { left: -100%; }
        100% { left: 100%; }
    }

    .icon-square {
        background: #ffffff;
        width: 70px; height: 70px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        position: relative; z-index: 2;
    }

    .text-content { flex-grow: 1; position: relative; z-index: 2; }
    .text-content h2 { margin: 0; font-size: 26px; font-weight: 900; color: #1a1a2e; }
    .text-content p { margin: 0; font-size: 13px; font-weight: 700; color: #444; opacity: 0.8; }
</style>

<div class="sst-main-header">
    <h1 class="shandar-heading">किताब कोना</h1>
    <div style="margin-top: 10px;">
        <span style="color: #ffd700; border: 1.5px solid #ffd700; padding: 4px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; letter-spacing: 2px;">VVIP MISSION 🚩</span>
    </div>
</div>

<a href="passport_details.html" class="vvip-strip">
    <div class="gold-box">
        <div class="icon-square">📓</div>
        <div class="text-content">
            <h2>द बुक पासपोर्ट</h2>
            <p>विरासत और समीक्षा का सफ़रनामा</p>
        </div>
        <div style="font-size: 25px; font-weight: 900; color: #1a1a2e; position: relative; z-index: 2;">❯</div>
    </div>
</a>
