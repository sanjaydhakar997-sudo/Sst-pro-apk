<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Legacy Builder</title>
    <style>
        :root { --royal-blue: #1a1a2e; --gold: #ffd700; --white: #ffffff; }
        body { background-color: #f4f4f9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: var(--royal-blue); }
        
        /* 🚩 प्रीमियम हेडर */
        .header {
            background: linear-gradient(180deg, var(--royal-blue) 0%, #000 100%);
            padding: 50px 20px; text-align: center; border-bottom: 8px solid var(--gold); color: var(--gold);
        }

        .container { padding: 20px; max-width: 600px; margin: auto; }

        /* 💎 मज़बूत कार्ड्स */
        .legacy-card {
            background: var(--white); border-radius: 30px; padding: 25px;
            margin-bottom: 25px; border-right: 10px solid var(--gold);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative;
        }

        .section-title { font-size: 22px; font-weight: 950; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* 📦 इनपुट डिजाइन */
        .input-vip { 
            width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; 
            border: 2px solid #eee; font-weight: 700; box-sizing: border-box; font-family: inherit;
        }
        .input-vip:focus { border-color: var(--royal-blue); outline: none; background: #fdfae5; }

        /* 📜 विरासत की शपथ (Checkboxes) */
        .oath-box { background: #fdfae5; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); margin-bottom: 15px; }
        .oath-item { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; font-weight: 700; margin-bottom: 10px; }

        .request-btn {
            background: var(--royal-blue); color: var(--gold); width: 100%; padding: 20px; 
            border: none; border-radius: 20px; font-weight: 950; font-size: 18px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 8px 20px rgba(26, 26, 46, 0.3); transition: 0.3s;
        }
        .request-btn:active { transform: scale(0.98); }

        /* ✅ सफलता बॉक्स */
        .success-overlay {
            display: none; background: var(--royal-blue); color: var(--gold); padding: 35px;
            border-radius: 40px; text-align: center; border: 4px solid var(--gold);
            margin-top: 20px; animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0; font-size: 32px; font-weight: 950;">LEGACY BUILDER</h1>
        <p style="font-weight: 800; color: #fff; margin-top: 5px;">किताब नहीं, भविष्य चुनें 🚩</p>
    </div>

    <div class="container">

        <div class="legacy-card">
            <div class="section-title"><span>👤</span> छात्र की पहचान</div>
            <input type="text" id="reqName" class="input-vip" placeholder="आपका पूरा नाम *">
            <input type="number" id="reqPhone" class="input-vip" placeholder="व्हाट्सएप नंबर *">
            <input type="text" id="reqClass" class="input-vip" placeholder="आपकी कक्षा/कोर्स *">
            <input type="text" id="reqBook" class="input-vip" placeholder="कौनसी किताब चाहिए? *">
            <input type="text" id="reqAddress" class="input-vip" placeholder="पूरा पता (जहाँ किताब चाहिए) *">
        </div>

        <div class="legacy-card">
            <div class="section-title"><span>📜</span> विरासत की शपथ</div>
            <div class="oath-box">
                <div class="oath-item">
                    <input type="checkbox" id="oath1">
                    <label for="oath1">मैं शपथ लेता हूँ कि मैं इस किताब को बहुत संभाल कर रखूँगा/रखूँगी।</label>
                </div>
                <div class="oath-item">
                    <input type="checkbox" id="oath2">
                    <label for="oath2">पढ़ाई पूरी होने के बाद, मैं यह किताब SST Pro को वापस कर दूँगा ताकि किसी और छात्र की मदद हो सके।</label>
                </div>
            </div>
            
            <textarea id="reqReason" class="input-vip" style="height: 80px;" placeholder="यह किताब आपके लिए क्यों ज़रूरी है? (हमें बताएं)"></textarea>

            <button onclick="submitLegacyRequest()" class="request-btn">
                रिक्वेस्ट भेजें ❯
            </button>
        </div>

        <div id="successBox" class="success-overlay">
            <h2 style="margin: 0; font-size: 26px;">रिक्वेस्ट दर्ज हुई! 🚩</h2>
            <p style="color: #fff; margin-top: 15px; font-weight: 700; line-height: 1.6;">
                आपकी ज़रूरत हमारे पास पहुँच गई है। SST Pro टीम आपके विवरण की जाँच करेगी और किताब उपलब्ध होते ही आपसे संपर्क करेगी।
            </p>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 20px; font-size: 14px;">
                <b>ध्यान दें:</b> किताबें स्टॉक और डोनर की उपलब्धता के आधार पर भेजी जाती हैं।
            </div>
        </div>

    </div>

    <script>
        function submitLegacyRequest() {
            const name = document.getElementById('reqName').value;
            const phone = document.getElementById('reqPhone').value;
            const book = document.getElementById('reqBook').value;
            const address = document.getElementById('reqAddress').value;
            const reason = document.getElementById('reqReason').value || "विशेष कारण नहीं";
            const oath1 = document.getElementById('oath1').checked;
            const oath2 = document.getElementById('oath2').checked;

            if(!name || !phone || !book || !address) {
                alert("भाई, * वाली सारी जानकारी भरना ज़रूरी है!"); return;
            }

            if(!oath1 || !oath2) {
                alert("कृपया विरासत की शपथ स्वीकार करें!"); return;
            }

            document.getElementById('successBox').style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            const myNum = "919529812784";
            const text = `*नई किताब की ज़रूरत (Legacy Builder)*🚩%0A%0A*नाम:* ${name}%0A*नंबर:* ${phone}%0A*किताब:* ${book}%0A*पता:* ${address}%0A*कारण:* ${reason}%0A%0A_मैने शपथ ली है कि मैं किताब का सम्मान करूँगा।_`;
            
            setTimeout(() => {
                window.open(`https://wa.me/${myNum}?text=${text}`, "_blank");
            }, 1500);
        }
    </script>
</body>
</html>
