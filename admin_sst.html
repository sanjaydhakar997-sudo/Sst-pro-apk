<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #0f0f1a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1a1a2e; padding: 25px; border-radius: 15px; border: 1px solid #ffd700; width: 100%; max-width: 400px; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        input, select { background: #252545; color: white; }
        button { background: #ffd700; color: black; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 14px; color: #ffd700; }
        .progress-container { background: #252545; border-radius: 10px; height: 10px; width: 100%; display: none; }
        #progressBar { background: #00ff00; height: 100%; width: 0%; border-radius: 10px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚩 SST Pro - Admin</h2>
    <input type="text" id="bookTitle" placeholder="किताब या फाइल का नाम">
    <select id="category">
        <option value="The Royal Library">The Royal Library</option>
        <option value="Safarnama">Safarnama</option>
    </select>
    <input type="file" id="photoFile" accept="image/*">
    
    <div class="progress-container" id="pContainer">
        <div id="progressBar"></div>
    </div>
    
    <button onclick="uploadProcess()">UPLOAD TO APP</button>
    <p id="status">तैयार हैं? फोटो चुनें।</p>
</div>

<script>
    // --- यहाँ अपनी Firebase Details डालें ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "sst-pro-library.firebaseapp.com",
        projectId: "sst-pro-library",
        storageBucket: "sst-pro-library.firebasestorage.app",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    const db = firebase.firestore();

    async function uploadProcess() {
        const title = document.getElementById('bookTitle').value;
        const category = document.getElementById('category').value;
        const file = document.getElementById('photoFile').files[0];
        const status = document.getElementById('status');
        const pBar = document.getElementById('progressBar');
        const pContainer = document.getElementById('pContainer');

        if(!title || !file) { alert("नाम और फोटो दोनों ज़रूरी हैं!"); return; }

        const fileName = Date.now() + "_" + file.name;
        const storageRef = storage.ref('uploads/' + fileName);
        const uploadTask = storageRef.put(file);

        pContainer.style.display = 'block';

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                pBar.style.width = progress + "%";
                status.innerText = "अपलोड हो रहा है: " + Math.round(progress) + "%";
            }, 
            (error) => {
                status.innerText = "Error: " + error.message;
                console.error(error);
            }, 
            async () => {
                const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                await db.collection(category).add({
                    title: title,
                    img: downloadURL,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                status.innerText = "बधाई हो! फोटो लाइव हो गई ✅";
                pContainer.style.display = 'none';
            }
        );
    }
</script>

</body>
</html>
