<script>
    async function uploadBook() {
        const file = document.getElementById('fileInput').files[0];
        const bookTitle = document.getElementById('bookName').value;
        const status = document.getElementById('status');
        
        if(!file || !bookTitle) {
            alert("नाम और फोटो दोनों ज़रूरी हैं भाई!");
            return;
        }

        // आपकी Cloudinary डिटेल्स
        const cloudName = "dppmrodwf"; 
        const uploadPreset = "sst_pro"; 

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', uploadPreset);

        status.innerText = "अपलोड शुरू हो रहा है... 🚀";

        try {
            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.secure_url) {
                status.innerText = "अपलोड सफल! ✅";
                const photoUrl = data.secure_url;
                
                // अब इस photoUrl को आप कहीं भी दिखा सकते हैं
                console.log("आपकी फोटो का लिंक ये रहा: ", photoUrl);
                alert("फोटो लाइब्रेरी के लिए तैयार है!");
                
            } else {
                status.innerText = "Error: Preset नाम चेक करें!";
                console.log(data);
            }
        } catch (error) {
            status.innerText = "नेटवर्क की दिक्कत है!";
            console.error(error);
        }
    }
</script>
