<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Admin Upload</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #05050a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #121225; padding: 20px; border-radius: 15px; border: 1px solid #ffd700; margin-top: 20px; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { background: #ffd700; color: black; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; color: #ffd700; }
    </style>
</head>
<body>

    <h2>🚩 SST Pro - Upload Panel</h2>
    
    <div class="box">
        <input type="text" id="bookTitle" placeholder="किताब या सफरनामा का नाम">
        <input type="text" id="donorName" placeholder="आपका नाम (By: Admin)">
        <select id="category">
            <option value="library">The Royal Library</option>
            <option value="safarnama">सफरनामा (Safarnama)</option>
        </select>
        <p>गैलरी से फोटो चुनें:</p>
        <input type="file" id="photoFile" accept="image/*">
        <br><br>
        <button onclick="uploadEverything()">UPLOAD TO APP</button>
        <p id="status"></p>
    </div>

    <script>
        // आपका Magic Code यहाँ सेट कर दिया है
        const firebaseConfig = {
            apiKey: "AIzaSyASJxjxshpwJZMPtGFKryIo8DNcr8qHTi0",
            authDomain: "sst-pro-library.firebaseapp.com",
            projectId: "sst-pro-library",
            storageBucket: "sst-pro-library.firebasestorage.app",
            messagingSenderId: "768642848018",
            appId: "1:768642848018:web:eed62246b7c1c107d14fcb",
            measurementId: "G-Y67ZP4W52Z"
        };

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        async function uploadEverything() {
            const title = document.getElementById('bookTitle').value;
            const donor = document.getElementById('donorName').value;
            const category = document.getElementById('category').value;
            const file = document.getElementById('photoFile').files[0];
            const status = document.getElementById('status');

            if(!title || !file) { alert("कृपया नाम और फोटो भरें!"); return; }

            status.innerText = "अपलोड हो रहा है... कृपया रुकें ⏳";

            // 1. Storage में फोटो भेजना
            const storageRef = storage.ref('uploads/' + file.name);
            await storageRef.put(file);
            const downloadURL = await storageRef.getDownloadURL();

            // 2. Firestore में डेटा सेव करना
            await db.collection(category).add({
                title: title,
                donor: donor,
                img: downloadURL,
                time: firebase.firestore.FieldValue.serverTimestamp()
            });

            status.innerText = "बधाई हो! फोटो ऐप में लाइव हो गई है ✅";
            document.getElementById('bookTitle').value = "";
        }
    </script>
</body>
</html>
