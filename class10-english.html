<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 10th English Hub | Sanjay Dhakar Sir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); 
            color: #1e293b; 
            padding-bottom: 60px; 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* प्रीमियम डिजिटल हेडर */
        .app-header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 30px 20px;
            border-radius: 32px;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 25px;
            border-bottom: 6px solid #1e1e2f;
            box-shadow: 0 15px 35px rgba(49, 46, 129, 0.25);
            position: relative;
        }
        
        /* ⬅️ हेडर के अंदर सुंदर बैक बटन जो class10.html पर ले जाएगा */
        .header-back-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .header-back-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }

        .app-header h1 { font-size: 24px; font-weight: 900; color: #ffffff; }
        .app-header p { font-size: 11px; color: #c7d2fe; font-weight: 700; margin-top: 4px; letter-spacing: 1px; }

        .section-title {
            font-size: 16px;
            font-weight: 900;
            color: #312e81;
            margin: 10px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, #312e81, transparent); }

        /* 📑 2-कॉलम फोल्डर ग्रिड */
        .english-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .folder-card {
            background: #ffffff;
            padding: 25px 15px;
            border-radius: 24px;
            text-decoration: none;
            color: #0f172a;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 3D बॉर्डर्स और थीम्स */
        .f-prose { border-bottom: 6px solid #6366f1; }
        .f-poetry { border-bottom: 6px solid #ec4899; }
        .f-footprints { border-bottom: 6px solid #10b981; }
        .f-grammar { border-bottom: 6px solid #8b5cf6; }

        .folder-card:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        .folder-card h3 { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
        .folder-card p { font-size: 11px; color: #64748b; font-weight: 700; line-height: 1.3; }

        .back-menu-link {
            display: block; text-align: center; margin-top: 40px;
            color: #64748b; font-size: 13px; font-weight: 700; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="app-header">
            <a href="class10.html" class="header-back-btn">⬅</a>
            <h1>Class 10th - English</h1>
            <p>COMPLETE COURSE BY SANJAY SIR</p>
        </div>

        <h2 class="section-title">📖 Select Section</h2>

        <div class="english-grid">
            
            <a href="english-prose.html" class="folder-card f-prose">
                <h3 style="color: #4338ca;">📝 Prose</h3>
                <p>First Flight (Chapters)</p>
            </a>

            <a href="english-poetry.html" class="folder-card f-poetry">
                <h3 style="color: #be185d;">🌸 Poetry</h3>
                <p>All Important Poems</p>
            </a>

            <a href="english-footprints.html" class="folder-card f-footprints">
                <h3 style="color: #047857;">👣 Footprints</h3>
                <p>Supplementary Reader</p>
            </a>

            <a href="english-grammar.html" class="folder-card f-grammar">
                <h3 style="color: #6d28d9;">✍️ Grammar</h3>
                <p>व्याकरण एवं Writing Skills</p>
            </a>

        </div>

        <a href="class10.html" class="back-menu-link">⬅️ विषय चयन पर वापस जाएं</a>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
