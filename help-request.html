<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - मिशन संकल्प</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        :root { --main: #1a3a5f; --gold: #ffd700; --bg: #f0f4f8; --success: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: linear-gradient(135deg, #001f3f, #1a3a5f); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .tab-container { display: flex; justify-content: center; gap: 10px; margin: -20px auto 20px; width: 92%; max-width: 480px; position: relative; z-index: 10; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .active-tab { background: var(--gold); color: var(--main); }
        .inactive-tab { background: white; color: #666; }
        .form-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 92%; max-width: 480px; margin: 0 auto 30px; box-sizing: border-box; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0 18px 0; border-radius: 12px; border: 1px solid #d1d9e6; box-sizing: border-box; background: #f8f9fa; }
        .submit-btn { width: 100%; background: var(--main); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        #loader { display: none; text-align: center; color: var(--main); font-weight: bold; padding: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 मिशन संकल्प</h1>
    <p>शिक्षा के सफर में आपका साथी - SST PRO</p>
</div>

<div class="tab-container">
    <button class="tab-btn active-tab" id="needBtn" onclick="showForm('need')">मुझे मदद चाहिए</button>
    <button class="tab-btn inactive-tab" id="giveBtn" onclick="showForm('give')">मुझे मदद करनी है</button>
</div>

<div id="needForm" class="form-card">
    <h2>जरूरतमंद छात्र पंजीकरण</h2>
    <input type="text" id="stuName" placeholder="आपका नाम *">
    <input type="number" id="stuWhatsApp" placeholder="व्हाट्सएप नंबर *">
    <textarea id="bookList" rows="2" placeholder="कौनसी किताबें चाहिए? *"></textarea>
    <label style="background: #f0f7ff; border: 2px dashed #adc5cf; padding: 15px; display: block; border-radius: 12px; text-align: center; cursor: pointer;">
        <input type="file" id="marksheetPic" accept="image/*" style="display:none;" onchange="imgCheck('upStatus1')">
        <span id="upStatus1">📸 मार्कशीट / ID फोटो चुनें *</span>
    </label><br>
    <button onclick="submitMission('need')" class="submit-btn" id="sBtn1">रिक्वेस्ट भेजें ❯</button>
</div>

<div id="giveForm" class="form-card" style="display: none;">
    <h2>दानवीर छात्र पंजीकरण</h2>
    <input type="text" id="donorName" placeholder="आपका नाम *">
    <input type="number" id="donorWhatsApp" placeholder="व्हाट्सएप नंबर *">
    <textarea id="donorBooks" rows="2" placeholder="किताबों के नाम *"></textarea>
    <label style="background: #f0fff4; border: 2px dashed #25d366; padding: 15px; display: block; border-radius: 12px; text-align: center; cursor: pointer;">
        <input type="file" id="bookPic" accept="image/*" style="display:none;" onchange="imgCheck('upStatus2')">
        <span id="upStatus2">📸 किताबों की फोटो चुनें *</span>
    </label><br>
    <button onclick="submitMission('give')" class="submit-btn" style="background: var(--success);" id="sBtn2">मैं मदद के लिए तैयार हूँ ❯</button>
</div>

<div id="loader">प्रोसेस हो रहा है, कृपया रुकें... ⏳</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbym06GAtqxEr0hZ9giMcxfa1jFNQi1ijzhlmrW9O1AaGva2OmuJiDpWNLOBJx5wsBPc/exec';

    function showForm(type) {
        document.getElementById('needForm').style.display = (type === 'need') ? 'block' : 'none';
        document.getElementById('giveForm').style.display = (type === 'give') ? 'block' : 'none';
        document.getElementById('needBtn').className = (type === 'need') ? 'tab-btn active-tab' : 'tab-btn inactive-tab';
        document.getElementById('giveBtn').className = (type === 'give') ? 'tab-btn active-tab' : 'tab-btn inactive-tab';
    }

    function imgCheck(id) {
        document.getElementById(id).innerHTML = "✅ फोटो चुन ली गई!";
    }

    async function submitMission(mode) {
        const fileInput = mode === 'need' ? document.getElementById('marksheetPic') : document.getElementById('bookPic');
        const name = mode === 'need' ? document.getElementById('stuName').value : document.getElementById('donorName').value;
        const whatsapp = mode === 'need' ? document.getElementById('stuWhatsApp').value : document.getElementById('donorWhatsApp').value;
        const books = mode === 'need' ? document.getElementById('bookList').value : document.getElementById('donorBooks').value;

        if(!fileInput.files[0] || !name || !whatsapp) return alert("सभी जानकारी भरें!");

        document.getElementById('loader').style.display = 'block';

        try {
            // 1. फोटो कम्प्रेशन
            const compressedFile = await imageCompression(fileInput.files[0], { maxSizeMB: 0.2, maxWidthOrHeight: 800 });

            // 2. क्लाउडिनरी अपलोड
            const formData = new FormData();
            formData.append('file', compressedFile);
            formData.append('upload_preset', 'sst_pro');
            const cloudResp = await fetch('https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', { method: 'POST', body: formData });
            const cloudData = await cloudResp.json();

            // 3. गूगल शीट में डेटा भेजना
            const finalData = {
                "DonorName": name,
                "BookTitle": books,
                "Price": mode === 'need' ? "REQUEST" : "FREE",
                "ImageUrl": cloudData.secure_url,
                "Phone": whatsapp
            };

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(finalData) });

            alert("🚩 मिशन सफल! डेटा अपडेट हो गया।");
            window.location.href = "library.html";

        } catch (err) {
            alert("एरर: " + err.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
