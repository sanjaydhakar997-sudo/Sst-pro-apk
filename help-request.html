<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - मिशन संकल्प फॉर्म</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        :root { --main: #1a3a5f; --gold: #ffd700; --bg: #f0f4f8; --success: #25d366; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        .header { background: linear-gradient(135deg, #001f3f, #1a3a5f); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        
        /* टैब बटन स्टाइल */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin: -20px auto 20px; width: 92%; max-width: 480px; position: relative; z-index: 10; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .active-tab { background: var(--gold); color: var(--main); }
        .inactive-tab { background: white; color: #666; }

        .form-card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 92%; max-width: 480px; margin: 0 auto 30px; box-sizing: border-box; }
        
        h2 { color: var(--main); font-size: 18px; margin-bottom: 20px; text-align: center; font-weight: 800; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        
        label { font-size: 12px; font-weight: bold; color: var(--main); margin-left: 5px; }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 8px 0 18px 0; border-radius: 12px; 
            border: 1px solid #d1d9e6; box-sizing: border-box; background: #f8f9fa; 
            font-size: 14px; outline: none; transition: 0.3s;
        }

        .passport-banner {
            background: linear-gradient(45deg, #ffd700, #ff9f43);
            padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center;
            border: 2px dashed var(--main);
        }

        .submit-btn { 
            width: 100%; background: var(--main); color: white; border: none; 
            padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 800; 
            cursor: pointer; text-transform: uppercase;
        }
        
        #loader { display: none; text-align: center; color: var(--main); font-weight: bold; padding: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin: 0; font-size: 22px;">📚 मिशन संकल्प</h1>
    <p style="font-size: 11px; opacity: 0.9; margin-top: 5px;">शिक्षा के सफर में आपका साथी - SST PRO</p>
</div>

<div class="tab-container">
    <button class="tab-btn active-tab" id="needBtn" onclick="showForm('need')">मुझे मदद चाहिए</button>
    <button class="tab-btn inactive-tab" id="giveBtn" onclick="showForm('give')">मुझे मदद करनी है</button>
</div>

<div id="needForm" class="form-card">
    <h2>जरूरतमंद छात्र पंजीकरण</h2>
    <label>पूरा नाम *</label>
    <input type="text" id="stuName" placeholder="आपका नाम लिखें">
    <label>व्हाट्सएप नंबर *</label>
    <input type="number" id="stuWhatsApp" placeholder="संपर्क के लिए">
    <label>शहर / गांव *</label>
    <input type="text" id="stuCity" placeholder="जैसे: चित्तौड़गढ़">
    <label>पूरा डाक पता *</label>
    <textarea id="stuAddress" rows="2" placeholder="पूरा पता पिनकोड सहित"></textarea>
    <label>किताबों की सूची *</label>
    <textarea id="bookList" rows="2" placeholder="कौनसी किताबें चाहिए?"></textarea>
    
    <label style="background: #f0f7ff; border: 2px dashed #adc5cf; padding: 15px; display: block; border-radius: 12px; text-align: center; margin-bottom: 20px;">
        <input type="file" id="marksheetPic" accept="image/*" style="display:none;" onchange="imgCheck('upStatus1')">
        <span id="upStatus1">📸 मार्कशीट / ID अपलोड करें *</span>
    </label>

    <button onclick="submitHelp('need')" class="submit-btn" id="sBtn1">रिक्वेस्ट सबमिट करें ❯</button>
</div>

<div id="giveForm" class="form-card" style="display: none;">
    <h2>दानवीर छात्र पंजीकरण</h2>
    
    <div class="passport-banner">
        <p style="margin: 0 0 10px; font-weight: 900; color: var(--main); font-size: 14px;">अपनी किताब पर चिपकाने के लिए "SST पासपोर्ट" यहाँ से बनाएं 👇</p>
        <a href="book-passport.html" style="background: var(--main); color: white; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; display: inline-block;">बनायें अपना पासपोर्ट 📄</a>
    </div>

    <label>आपका नाम *</label>
    <input type="text" id="donorName" placeholder="आपका नाम लिखें">
    <label>व्हाट्सएप नंबर *</label>
    <input type="number" id="donorWhatsApp" placeholder="संपर्क के लिए">
    <label>दान करने वाली किताबों के नाम *</label>
    <textarea id="donorBooks" rows="2" placeholder="जैसे: 12वीं इतिहास, भूगोल नोट्स आदि"></textarea>
    
    <label style="background: #f0fff4; border: 2px dashed #25d366; padding: 15px; display: block; border-radius: 12px; text-align: center; margin-bottom: 20px;">
        <input type="file" id="bookPic" accept="image/*" style="display:none;" onchange="imgCheck('upStatus2')">
        <span id="upStatus2" style="color: #128c7e;">📸 किताबों की फोटो अपलोड करें *</span>
    </label>

    <button onclick="submitHelp('give')" class="submit-btn" style="background: var(--success);" id="sBtn2">मैं मदद के लिए तैयार हूँ ❯</button>
</div>

<div id="loader">आपकी जानकारी सुरक्षित भेजी जा रही है... ⏳</div>

<script>
    function showForm(type) {
        const needF = document.getElementById('needForm');
        const giveF = document.getElementById('giveForm');
        const needB = document.getElementById('needBtn');
        const giveB = document.getElementById('giveBtn');

        if(type === 'need') {
            needF.style.display = 'block'; giveF.style.display = 'none';
            needB.className = 'tab-btn active-tab'; giveB.className = 'tab-btn inactive-tab';
        } else {
            needF.style.display = 'none'; giveF.style.display = 'block';
            needB.className = 'tab-btn inactive-tab'; giveB.className = 'tab-btn active-tab';
        }
    }

    function imgCheck(id) {
        document.getElementById(id).innerHTML = "✅ फोटो अटैच हो गई!";
        document.getElementById(id).style.color = "#27ae60";
    }

    async function submitHelp(mode) {
        // यहाँ आपका पुराना सबमिशन लॉजिक रहेगा, बस IDs बदल जाएंगी (donorName, donorBooks आदि)
        // मोड के हिसाब से डेटा Formspree पर जाएगा
        alert("बॉस, डेटा जा रहा है! (लॉजिक सेट है)");
    }
</script>
</body>
</html>
