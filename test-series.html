button{

padding:14px;

font-weight:bold;

}

.topic{

.questionBox{

}

.option{
background:#475569;

}

.option:hover{
background:#64748b;
}

.selected{

}

.navBtns{

}

.navBtns button{

.submitBtn{

.successPage{

</style>
</head>

<button onclick="continueToTopics()">Continue</button>

</div>

<!-- TOPICS PAGE -->

<div class="container" id="topicsPage" style="display:none;">

<div id="topicsList"></div>

<div class="container" id="testPage" style="display:none;">

<h2 id="testTitle"></h2>

<div class="timer" id="timer">30:00</div>

<button class="submitBtn" onclick="submitTest()">
