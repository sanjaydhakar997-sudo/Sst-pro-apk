<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST PRO - Premium Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. MASTER VARIABLES (The Branding Engine) */
        :root {
            --primary-dark: #0f172a;   
            --primary-light: #1e293b;
            --accent-gold: #f59e0b;    
            --accent-soft: #fbaf24;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --bg-base: #f8fafc;
            --surface-card: #ffffff;
            --text-title: #0f172a;
            --text-body: #475569;
            --text-light: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.8);
            
            /* Shadows for Depth */
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 40px rgba(15, 23, 42, 0.1);
            --shadow-gold: 0 10px 25px rgba(245, 158, 11, 0.2);
            
            /* Transitions */
            --bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. GLOBAL RESET & SECURITY (Anti-Copy/Anti-Blue) */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Manrope', sans-serif;
            scroll-behavior: smooth;
        }

        html, body {
            width: 100%; height: 100%;
            background-color: var(--bg-base);
            color: var(--text-body);
            overflow-x: hidden;
            -webkit-user-select: none; /* कंटेंट चोरी रोकना */
            -ms-user-select: none;
            user-select: none;
        }

        /* 3. SCROLLBAR CUSTOMIZATION (App Feel) */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-light); border-radius: 10px; }

        /* 4. THE MASTER WRAPPER */
        #app-root {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 5. ANTI-LOCAL LINKING (Problem Fix 1 & 3) */
        a {
            text-decoration: none !important;
            color: inherit !important;
            -webkit-user-drag: none;
        }

        /* 6. BUTTON INTERACTION ENGINE */
        .btn-interaction {
            position: relative;
            overflow: hidden;
            transition: var(--smooth);
        }

        .btn-interaction:active {
            transform: scale(0.94);
            filter: brightness(0.9);
        }

        /* 7. UTILITY CLASSES (For Expansion) */
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .glass-effect { backdrop-filter: blur(10px); background: var(--glass-bg); }
        .text-gradient {
            background: linear-gradient(135deg, var(--primary-dark), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div id="app-root">
        </div>

    <script>
        // मास्टर सिक्योरिटी: राइट क्लिक बंद (APK फील के लिए)
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

</body>
</html>
