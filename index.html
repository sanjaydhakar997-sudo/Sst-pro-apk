<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST Classes Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
        #map { height: 100%; width: 100%; }
        #header {
            position: absolute; top: 0; width: 100%; z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 20px; text-align: center; pointer-events: none;
        }
        .title { color: #ffd700; font-family: 'Arial Black', sans-serif; font-size: 24px; text-shadow: 2px 2px 4px #000; letter-spacing: 2px; }
        .subtitle { color: #fff; font-family: Arial; font-size: 12px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="header">
        <div class="title">SST CLASSES PRO</div>
        <div class="subtitle">GEOGRAPHY ANIMATION SERIES</div>
    </div>
    <div id="map"></div>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([22, 78], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        var path = [[35, 10], [33, 25], [36, 40], [32, 55], [34, 70], [29, 76]];
        var line = L.polyline(path, {color: '#00eeff', weight: 5, dashArray: '12, 18'}).addTo(map);
        var offset = 0;
        setInterval(function() { line.setStyle({ dashOffset: offset }); offset--; }, 30);
        var rain = L.circle([30, 75], { color: '#0088ff', radius: 400000, fillOpacity: 0.4 }).addTo(map);
        var r = 400000; var grow = true;
        setInterval(function() {
            if(grow) { r += 6000; if(r > 480000) grow = false; }
            else { r -= 6000; if(r < 320000) grow = true; }
            rain.setRadius(r);
        }, 80);
    </script>
</body>
</html>
