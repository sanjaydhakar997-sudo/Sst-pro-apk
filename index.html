<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SST Classes - Premium Mission 2026</title>
    <style>
        :root {
            --primary: #0f172a;    /* डार्क प्रीमियम नेवी */
            --accent: #fbbf24;     /* वाइब्रेंट गोल्ड */
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #1e293b;
            overflow-x: hidden;
        }

        /*--- प्रीमियम एनिमेटेड हेडर ---*/
        header {
            background: var(--glass);
            backdrop-filter: blur(15px); /* कांच जैसा इफेक्ट */
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 20px;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .logo-area {
            position: relative;
        }

        .logo-area h1 {
            color: var(--primary);
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
            position: relative;
        }

        .logo-area span {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* लाइव पल्स एनीमेशन (Notification Icon) */
        .notification-btn {
            position: relative;
            background: white;
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 20px;
        }

        .pulse-dot {
            position: absolute;
            top: 8px; right: 8px;
            width: 8px; height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid white;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.7); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.7); }
        }

        /*--- डैजलिंग कमिंग सून मोडल ---*/
        #comingSoonModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            width: 88%;
            max-width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid white;
            transform: translateY(0);
            animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalSlideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .lottie-placeholder {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-content h2 { color: var(--primary); font-size: 24px; font-weight: 900; }
        .modal-content p { color: #475569; font-size: 15px; margin: 10px 0 25px; line-height: 1.5; }
        
        .close-btn {
            background: var(--primary);
            color: white; border: none;
            padding: 15px 40px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
            transition: 0.3s;
        }

        .close-btn:active { transform: scale(0.95); }

        .content-wrapper {
            padding-top: 85px;
        }

    </style>
</head>
<body>
