name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App
        run: |
          cordova create myApp com.sstclasses.pro "SST Classes Pro"
          cp config.xml myApp/config.xml
          cp index.html myApp/www/index.html

      - name: Build Android
        run: |
          cd myApp
          cordova platform add android@9.1.0
          cordova build android --no-telemetry --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
