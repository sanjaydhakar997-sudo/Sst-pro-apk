name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Setup Project
        run: |
          cordova create myApp com.sstclasses.pro "SST Classes Pro"
          cp config.xml myApp/config.xml
          cp index.html myApp/www/index.html

      - name: Build Android
        run: |
          cd myApp
          cordova platform add android@12.0.0
          # यह लाइन Gradle की गड़बड़ को ठीक कर देगी
          cordova build android --no-telemetry --device -- --gradleArg=-Pandroid.useAndroidX=true --gradleArg=-Pandroid.enableJetifier=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
