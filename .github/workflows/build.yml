name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Magic
        run: |
          # 1. Cordova को एकदम ताज़ा इंस्टॉल करना
          npm install -g cordova
          
          # 2. नया प्रोजेक्ट बनाना (बिना किसी पुराने कचरे के)
          cordova create myApp com.sstclasses.pro "SSTClassesPro"
          cd myApp
          
          # 3. अपनी फाइलें सही जगह पहुँचाना
          cp ../config.xml .
          cp ../index.html www/
          
          # 4. Android जोड़ना (एकदम लेटेस्ट और स्टेबल)
          cordova platform add android@11.0.0
          
          # 5. बिल्ड शुरू करना (बिना किसी रुकावट के)
          cordova build android --no-telemetry --device --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
