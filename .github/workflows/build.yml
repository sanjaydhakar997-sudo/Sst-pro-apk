name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Setup Cordova
        run: npm install -g cordova@11.0.0

      - name: Create and Build App
        run: |
          # 1. प्रोजेक्ट बनाना
          cordova create myApp com.sstclasses.pro "SST Classes Pro"
          cd myApp
          
          # 2. फाइलें कॉपी करना
          cp ../config.xml .
          cp ../index.html www/
          
          # 3. प्लेटफॉर्म जोड़ना और बिल्ड करना
          cordova platform add android@10.1.2
          cordova build android --no-telemetry --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
