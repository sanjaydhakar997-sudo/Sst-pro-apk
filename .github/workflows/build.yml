name: Build Clean APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Java 11 सेट करना (सबसे स्टेबल)
      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      # 2. Node.js सेट करना
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Cordova और प्रोजेक्ट सेटअप
      - name: Install Cordova and Build
        run: |
          npm install -g cordova
          cordova create myApp com.sst.pro "SST_Pro"
          cd myApp
          # आपकी index.html को उठाना
          cp ../index.html www/index.html
          # Android 10 इस्तेमाल करेंगे (सबसे पक्का चलता है)
          cordova platform add android@10.1.2
          # एरर से बचने के लिए Gradle की एक सेटिंग
          echo "android.useAndroidX=true" > platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties
          # बिल्ड शुरू
          cordova build android --no-telemetry --device

      # 4. APK को बाहर निकालना
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Clean-SST-Pro-APK
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
