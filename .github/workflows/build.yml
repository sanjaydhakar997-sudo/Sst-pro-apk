name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17' # लेटेस्ट Java जो एरर नहीं देगा

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # लेटेस्ट Node.js

      - name: Build Magic
        run: |
          # 1. Cordova का सबसे लेटेस्ट वर्जन
          npm install -g cordova
          
          # 2. नया प्रोजेक्ट
          cordova create myApp com.sst.pro "SSTPro"
          cd myApp
          
          # 3. आपकी index.html डालना
          rm www/index.html
          cp ../index.html www/
          
          # 4. Android का लेटेस्ट और सबसे स्टेबल वर्जन (12)
          cordova platform add android@12.0.0
          
          # 5. बिना किसी झंझट के बिल्ड
          cordova build android --no-telemetry --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
