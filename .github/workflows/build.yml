name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Setup Project
        run: |
          # 1. नया प्रोजेक्ट बनाना
          cordova create myApp com.sstclasses.pro "SST Classes Pro"
          
          # 2. अपनी फाइलों को प्रोजेक्ट के अंदर डालना
          cp config.xml myApp/config.xml
          cp index.html myApp/www/index.html
          
          # 3. पुराने 'github' फोल्डर को हटाना (अगर है तो) ताकि कन्फ्यूजन न हो
          rm -rf github

      - name: Build Android
        run: |
          cd myApp
          cordova platform add android@12.0.0
          cordova build android --no-telemetry --device

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sst-pro-app-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
