<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफ़रनामा - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; }
        body { background: #0c0c14; font-family: 'Segoe UI', sans-serif; margin: 0; color: #fff; text-align: center; }
        .container { padding: 40px 20px; max-width: 600px; margin: auto; }
        .card { 
            background: var(--royal); padding: 30px; border-radius: 30px; 
            border: 3px solid var(--gold); box-shadow: 0 15px 40px rgba(255,215,0,0.2);
        }
        h1 { color: var(--gold); font-size: 32px; font-weight: 950; margin-bottom: 10px; }
        p { font-weight: 600; line-height: 1.6; opacity: 0.9; }
        .form-btn { 
            display: block; background: var(--gold); color: #000; padding: 22px; 
            border-radius: 50px; font-weight: 950; text-decoration: none; 
            font-size: 20px; margin-top: 30px; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255,215,0,0.4);
        }
        .form-btn:hover { transform: scale(1.05); }
        .steps { text-align: left; margin-top: 30px; font-size: 14px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
        .step-item { margin-bottom: 10px; display: flex; align-items: center; }
        .step-num { background: var(--gold); color: #000; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 10px; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>सफ़रनामा 🚩</h1>
            <p>अपनी किताबों को एक नई "विरासत" में बदलें। आपकी एक छोटी सी पहल किसी छात्र का भविष्य बना सकती है।</p>
            
            <div class="steps">
                <div class="step-item"><div class="step-num">1</div> अपनी जानकारी और किताब का नाम भरें।</div>
                <div class="step-item"><div class="step-num">2</div> किताब की 3-5 साफ़ फोटो अपलोड करें।</div>
                <div class="step-item"><div class="step-num">3</div> जमा करने के बाद वह "Royal Library" में दिखेगी।</div>
            </div>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLScRtJIsz4GCAON-0_mGodUJ43nNQeNNHrgrt7dgaoCQWQMEgA/viewform" class="form-btn">
                विरासत जमा करें ❯
            </a>

            <p style="font-size: 12px; margin-top: 20px; opacity: 0.6;">सुरक्षित एवं पारदर्शी - SST Pro Mission</p>
        </div>
    </div>

</body>
</html>
