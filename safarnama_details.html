<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफ़रनामा 🚩 - SST Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; }
        body { background: var(--dark); font-family: 'Poppins', sans-serif; margin: 0; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: var(--royal); padding: 30px; border-radius: 30px; border: 2px solid var(--gold); width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .trust-banner { background: var(--gold); color: #000; font-size: 11px; font-weight: 900; padding: 5px 0; position: absolute; top: 0; left: 0; width: 100%; text-transform: uppercase; }
        h1 { color: var(--gold); font-size: 28px; margin-top: 20px; margin-bottom: 5px; }
        .tagline { font-size: 13px; color: #ddd; margin-bottom: 20px; line-height: 1.4; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #252545; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        .price-group { display: flex; gap: 10px; margin: 10px 0; }
        .p-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .file-label { display: block; border: 2px dashed var(--gold); padding: 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; background: rgba(255, 215, 0, 0.05); }
        .btn { background: var(--gold); color: #000; width: 100%; padding: 18px; border-radius: 50px; font-weight: 900; border: none; font-size: 17px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,215,0,0.3); transition: 0.2s; }
        #pLine { width: 0%; height: 6px; background: var(--gold); position: absolute; bottom: 0; left: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <div class="trust-banner">100% सुरक्षित • निःस्वार्थ सेवा • पूर्ण विश्वास</div>
    <h1>सफ़रनामा 🚩</h1>
    <p class="tagline">"आपकी एक पुरानी किताब किसी का भविष्य बदल सकती है।"</p>
    
    <input type="text" id="userName" placeholder="आपका शुभ नाम *">
    <input type="tel" id="userPhone" placeholder="WhatsApp नंबर *">
    <input type="text" id="bTitle" placeholder="किताब का नाम / क्लास सेट *">

    <div class="price-group">
        <div onclick="setPrice(0)" id="btnFree" class="p-btn" style="background:var(--gold); color:#000;">निशुल्क</div>
        <div onclick="setPrice('ask')" id="btnPaid" class="p-btn">कीमत</div>
    </div>
    <input type="number" id="bPrice" placeholder="राशि (₹)" style="display:none;">

    <label class="file-label">
        <input type="file" id="bFile" accept="image/*" style="display:none;" onchange="updateInfo()">
        <span id="fileStatus">📸 किताब की फोटो चुनें *</span>
    </label>

    <button onclick="uploadMission()" class="btn" id="upBtn">विरासत साझा करें ❯</button>
    <div class="progress-line" id="pLine"></div>
</div>

<script>
    // आपका Google Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbym06GAtqxEr0hZ9giMcxfa1jFNQi1ijzhlmrW9O1AaGva2OmuJiDpWNLOBJx5wsBPc/exec';

    function setPrice(p) {
        const inp = document.getElementById('bPrice');
        if(p === 'ask') {
            inp.style.display = 'block';
            document.getElementById('btnPaid').style.background = 'var(--gold)';
            document.getElementById('btnPaid').style.color = '#000';
            document.getElementById('btnFree').style.background = 'transparent';
            document.getElementById('btnFree').style.color = 'var(--gold)';
        } else {
            inp.style.display = 'none'; inp.value = 0;
            document.getElementById('btnFree').style.background = 'var(--gold)';
            document.getElementById('btnFree').style.color = '#000';
            document.getElementById('btnPaid').style.background = 'transparent';
            document.getElementById('btnPaid').style.color = 'var(--gold)';
        }
    }

    function updateInfo() {
        document.getElementById('fileStatus').innerText = "✅ फोटो चुन ली गई है";
    }

    async function uploadMission() {
        const file = document.getElementById('bFile').files[0];
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const title = document.getElementById('bTitle').value;
        const price = document.getElementById('bPrice').value || "निशुल्क";

        if(!file || !name || !title || !phone) return alert("कृपया सभी जानकारी भरें!");

        const btn = document.getElementById('upBtn');
        btn.disabled = true;
        btn.innerText = "प्रोसेस हो रहा है...";

        try {
            // 1. फोटो कम्प्रेशन
            const options = { maxSizeMB: 0.2, maxWidthOrHeight: 800 };
            const compressedFile = await imageCompression(file, options);
            
            // 2. क्लाउडिनरी पर अपलोड
            const formData = new FormData();
            formData.append('file', compressedFile);
            formData.append('upload_preset', 'sst_pro'); 

            const cloudResp = await fetch('https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', { method: 'POST', body: formData });
            const cloudData = await cloudResp.json();
            const imageUrl = cloudData.secure_url;

            // 3. गूगल शीट में डेटा भेजना
            const sheetData = {
                "DonorName": name,
                "BookTitle": title,
                "Price": price,
                "ImageUrl": imageUrl,
                "Phone": phone
            };

            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(sheetData)
            });

            // 4. व्हाट्सएप मैसेज और धन्यवाद
            const waMsg = `🚩 *नयी विरासत दर्ज!*%0A👤 *दाता:* ${name}%0A📚 *किताब:* ${title}%0A💰 *कीमत:* ${price}%0A📞 *संपर्क:* ${phone}`;
            window.location.href = `https://wa.me/919529812784?text=${waMsg}`;

        } catch (err) {
            alert("कुछ दिक्कत आई, कृपया दोबारा कोशिश करें।");
            btn.disabled = false;
            btn.innerText = "विरासत साझा करें ❯";
        }
    }
</script>
</body>
</html>
