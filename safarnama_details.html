<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफ़रनामा 2.0 - SST Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        /* आपका पुराना CSS यहाँ वैसा ही रहेगा */
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; }
        body { background: var(--dark); font-family: 'Poppins', sans-serif; margin: 0; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .card { background: var(--royal); padding: 30px; border-radius: 30px; border: 2px solid var(--gold); width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .trust-banner { background: var(--gold); color: #000; font-size: 11px; font-weight: 900; padding: 5px 0; position: absolute; top: 0; left: 0; width: 100%; text-transform: uppercase; }
        h1 { color: var(--gold); font-size: 28px; margin-top: 20px; margin-bottom: 5px; }
        .tagline { font-size: 13px; color: #ddd; margin-bottom: 20px; line-height: 1.4; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #333; background: #252545; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 14px; }
        .set-box { background: rgba(255, 215, 0, 0.05); padding: 15px; border-radius: 15px; margin: 10px 0; text-align: left; border: 1px dashed var(--gold); }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; margin-top: 10px; }
        .price-group { display: flex; gap: 10px; margin: 10px 0; }
        .p-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--gold); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 13px; display: flex; align-items: center; justify-content: center; }
        .file-label { display: block; border: 2px dashed var(--gold); padding: 20px; border-radius: 20px; cursor: pointer; margin-top: 15px; background: rgba(255, 215, 0, 0.05); }
        .btn { background: var(--gold); color: #000; width: 100%; padding: 18px; border-radius: 50px; font-weight: 900; border: none; font-size: 17px; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,215,0,0.3); transition: 0.2s; }
        #successCard { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .pop-up { background: var(--royal); border: 2px solid var(--gold); padding: 40px 25px; border-radius: 40px; width: 100%; max-width: 380px; text-align: center; }
        .progress-line { width: 0%; height: 6px; background: var(--gold); position: absolute; bottom: 0; left: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <div class="trust-banner">100% सुरक्षित • निःस्वार्थ सेवा • पूर्ण विश्वास</div>
    <h1>सफ़रनामा 🚩</h1>
    <p class="tagline">"पूरी क्लास का सेट हो या एक किताब, आपका दान किसी का जीवन बदल देगा।"</p>
    
    <input type="text" id="userName" placeholder="आपका शुभ नाम *">
    <input type="text" id="userLoc" placeholder="आपका शहर / जिला *">
    <input type="tel" id="userPhone" placeholder="WhatsApp नंबर *">
    
    <select id="bType" onchange="checkType(this.value)">
        <option value="Book">📕 एक किताब (Single Book)</option>
        <option value="Full Set">📚 पूरा क्लास सेट (Complete Set)</option>
        <option value="Notes Sample">📝 नोट्स (Notes)</option>
    </select>

    <input type="text" id="bTitle" placeholder="किताब या नोट्स का शीर्षक *">

    <div id="setDetails" style="display:none;" class="set-box">
        <div class="check-grid">
            <label><input type="checkbox" class="sub-check" value="विज्ञान"> विज्ञान</label>
            <label><input type="checkbox" class="sub-check" value="गणित"> गणित</label>
            <label><input type="checkbox" class="sub-check" value="हिंदी"> हिंदी</label>
            <label><input type="checkbox" class="sub-check" value="अंग्रेजी"> अंग्रेजी</label>
        </div>
    </div>

    <div class="price-group">
        <div onclick="setPrice(0)" id="btnFree" class="p-btn" style="background:var(--gold); color:#000;">निशुल्क</div>
        <div onclick="setPrice('ask')" id="btnPaid" class="p-btn">कीमत</div>
    </div>
    <input type="number" id="bPrice" placeholder="राशि (₹)" style="display:none;">

    <label class="file-label">
        <input type="file" id="bFile" accept="image/*" multiple style="display:none;" onchange="updateInfo()">
        <span id="fileStatus">📸 फोटो (किताब या नोट्स की) *</span>
    </label>

    <button onclick="uploadMission()" class="btn" id="upBtn">विरासत साझा करें ❯</button>
    <div class="progress-line" id="pLine"></div>
</div>

<div id="successCard">
    <div class="pop-up">
        <h2>🚩 धन्यवाद!</h2>
        <p>आपकी विरासत अब लाइब्रेरी में सज चुकी है।</p>
        <button onclick="location.reload()" class="btn">ठीक है</button>
    </div>
</div>

<script>
    // --- यहाँ से जरूरी बदलाव शुरू हैं ---
    function checkType(v) {
        document.getElementById('setDetails').style.display = (v === 'Full Set') ? 'block' : 'none';
    }

    function setPrice(p) {
        const inp = document.getElementById('bPrice');
        if(p === 'ask') {
            inp.style.display = 'block';
            document.getElementById('btnPaid').style.background = 'var(--gold)';
            document.getElementById('btnPaid').style.color = '#000';
            document.getElementById('btnFree').style.background = 'transparent';
            document.getElementById('btnFree').style.color = 'var(--gold)';
        } else {
            inp.style.display = 'none'; inp.value = 0;
            document.getElementById('btnFree').style.background = 'var(--gold)';
            document.getElementById('btnFree').style.color = '#000';
            document.getElementById('btnPaid').style.background = 'transparent';
            document.getElementById('btnPaid').style.color = 'var(--gold)';
        }
    }

    function updateInfo() {
        const c = document.getElementById('bFile').files.length;
        document.getElementById('fileStatus').innerText = `✅ ${c} फोटो चुने गए`;
    }

    async function uploadMission() {
        const files = document.getElementById('bFile').files;
        const name = document.getElementById('userName').value;
        const loc = document.getElementById('userLoc').value;
        const phone = document.getElementById('userPhone').value;
        const title = document.getElementById('bTitle').value;
        const price = document.getElementById('bPrice').value || 0;

        if(!files.length || !name || !title) return alert("नाम और फोटो डालना जरूरी है!");

        const btn = document.getElementById('upBtn');
        const pLine = document.getElementById('pLine');
        btn.disabled = true;
        btn.innerText = "प्रोसेस हो रहा है...";

        let imageUrls = [];
        const setId = "SST" + Date.now(); // ग्रुपिंग के लिए आईडी

        for (let i = 0; i < files.length; i++) {
            const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1000 };
            const comp = await imageCompression(files[i], options);
            
            const formData = new FormData();
            formData.append('file', comp);
            formData.append('upload_preset', 'sst_pro'); 
            // 🚩 ये 2 लाइनें लाइब्रेरी में डेटा भेजने के लिए सबसे जरूरी हैं:
            formData.append('tags', 'sst_pro'); 
            formData.append('context', `title=${title}|donor=${name}|price=${price}|setid=${setId}`);

            try {
                const resp = await fetch('https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', { method: 'POST', body: formData });
                const resData = await resp.json();
                imageUrls.push(resData.secure_url);
                pLine.style.width = ((i + 1) / files.length * 100) + "%"; 
            } catch (err) { console.error("Cloudinary Error", err); }
        }

        // 🚩 WhatsApp पर आपको मैसेज भेजने के लिए
        const waMsg = `🚩 *नया दान अपडेट!*%0A👤 *दाता:* ${name}%0A📚 *किताब:* ${title}%0A📞 *संपर्क:* ${phone}%0A💰 *कीमत:* ${price}`;
        
        // Formspree पर भेजना
        fetch("https://formspree.io/f/xzdyowdw", {
            method: "POST",
            body: JSON.stringify({"नाम": name, "किताब": title, "लिंक": imageUrls.join(", ")}),
            headers: { 'Content-Type': 'application/json' }
        }).then(() => {
            document.getElementById('successCard').style.display = 'flex';
            // व्हाट्सएप खोलना
            window.open(`https://wa.me/919529812784?text=${waMsg}`, '_blank');
        });
    }
</script>
</body>
</html>
