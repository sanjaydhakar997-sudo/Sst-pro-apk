<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफ़रनामा - SST Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; }
        body { background: var(--dark); font-family: 'Segoe UI', sans-serif; margin: 0; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { 
            background: var(--royal); padding: 30px; border-radius: 30px; border: 2px solid var(--gold);
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        h1 { color: var(--gold); margin: 0 0 10px; font-size: 28px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #252545; color: white; box-sizing: border-box;
        }
        .file-box { border: 1px dashed var(--gold); padding: 10px; border-radius: 12px; margin: 10px 0; background: rgba(255,215,0,0.05); }
        .btn { 
            background: var(--gold); color: #000; width: 100%; padding: 18px; border-radius: 50px; 
            font-weight: 900; border: none; font-size: 18px; cursor: pointer; margin-top: 15px;
        }
        .btn:disabled { background: #555; cursor: not-allowed; }
        /* Progress Bar Style */
        .progress-container { width: 100%; background: #333; border-radius: 10px; margin-top: 15px; display: none; }
        .progress-bar { width: 0%; height: 10px; background: var(--gold); border-radius: 10px; transition: 0.3s; }
        #status { font-size: 14px; margin-top: 10px; color: var(--gold); }
    </style>
</head>
<body>

<div class="card">
    <h1>सफ़रनामा 🚩</h1>
    <p style="font-size: 13px; opacity: 0.8;">अपनी किताबों को एक नई "विरासत" में बदलें</p>
    
    <input type="text" id="dName" placeholder="आपका शुभ नाम">
    <input type="text" id="bTitle" placeholder="किताब का नाम">
    
    <div class="file-box">
        <span style="font-size: 12px; display: block; margin-bottom: 5px;">किताब की साफ़ फोटो चुनें:</span>
        <input type="file" id="bFile" accept="image/*" style="padding: 5px; border: none; background: transparent;">
    </div>

    <div class="progress-container" id="pCont">
        <div class="progress-bar" id="pBar"></div>
    </div>

    <button onclick="startUpload()" class="btn" id="upBtn">विरासत जमा करें ❯</button>
    <p id="status">SST Pro Mission</p>
</div>

<script>
    // Firebase Config (Keep it as it is)
    const firebaseConfig = {
        apiKey: "AIzaSyASJxjxshpwJZM9tGFKryIo8DNcR0qHTi0",
        projectId: "sst-pro-library",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function startUpload() {
        const file = document.getElementById('bFile').files[0];
        const name = document.getElementById('dName').value;
        const title = document.getElementById('bTitle').value;
        
        if(!file || !name || !title) return alert("सब कुछ भरें भाई!");

        const btn = document.getElementById('upBtn');
        const pCont = document.getElementById('pCont');
        const pBar = document.getElementById('pBar');
        const status = document.getElementById('status');

        btn.disabled = true;
        pCont.style.display = 'block';
        status.innerText = "SST Server से जुड़ रहे हैं...";

        const xhr = new XMLHttpRequest();
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'sst_pro'); // Cloudinary में यही नाम होना चाहिए

        // % देखने के लिए Logic
        xhr.upload.addEventListener('progress', (e) => {
            const percent = Math.round((e.loaded / e.total) * 100);
            pBar.style.width = percent + '%';
            status.innerText = "अपलोड हो रहा है: " + percent + "%";
        });

        xhr.onreadystatechange = async () => {
            if (xhr.readyState === 4 && xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                // Firebase में सेव करना
                await db.collection("Safarnama").add({
                    donor: name,
                    book: title,
                    image: data.secure_url,
                    time: new Date()
                });
                status.innerText = "बधाई हो! लाइब्रेरी में जुड़ गई ✅";
                alert("विरासत जमा हो गई!");
                location.reload();
            } else if (xhr.readyState === 4) {
                status.innerText = "Error: Preset 'sst_pro' चेक करें!";
                btn.disabled = false;
            }
        };

        xhr.open('POST', 'https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', true);
        xhr.send(formData);
    }
</script>
</body>
</html>
