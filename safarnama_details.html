<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफ़रनामा - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; }
        body { background: var(--dark); font-family: 'Segoe UI', sans-serif; margin: 0; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { 
            background: var(--royal); padding: 30px; border-radius: 30px; border: 2px solid var(--gold);
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center;
        }
        h1 { color: var(--gold); margin: 0 0 10px; font-size: 28px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #333; background: #252545; color: white; box-sizing: border-box;
        }
        .btn { 
            background: var(--gold); color: #000; width: 100%; padding: 18px; border-radius: 50px; 
            font-weight: 900; border: none; font-size: 18px; cursor: pointer; margin-top: 15px;
        }
        .progress-container { width: 100%; background: #333; border-radius: 10px; margin-top: 15px; display: none; }
        .progress-bar { width: 0%; height: 10px; background: var(--gold); border-radius: 10px; transition: 0.3s; }
        #status { font-size: 14px; margin-top: 10px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>सफ़रनामा 🚩</h1>
    <p style="font-size: 12px; opacity: 0.7;">अपनी विरासत को लाइब्रेरी से जोड़ें</p>
    
    <input type="text" id="bTitle" placeholder="किताब का नाम">
    <input type="file" id="bFile" accept="image/*" style="background: transparent; border: 1px dashed var(--gold);">
    
    <div class="progress-container" id="pCont">
        <div class="progress-bar" id="pBar"></div>
    </div>

    <button onclick="finalPowerUpload()" class="btn" id="upBtn">विरासत जमा करें ❯</button>
    <p id="status">SST Pro Server Online</p>
</div>

<script>
    function finalPowerUpload() {
        const file = document.getElementById('bFile').files[0];
        const title = document.getElementById('bTitle').value;
        
        if(!file || !title) return alert("नाम और फोटो डालना ज़रूरी है भाई!");

        const btn = document.getElementById('upBtn');
        const pCont = document.getElementById('pCont');
        const pBar = document.getElementById('pBar');
        const status = document.getElementById('status');

        btn.disabled = true;
        pCont.style.display = 'block';
        status.innerText = "सर्वर से जुड़ रहे हैं...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'sst_pro'); // Cloudinary Preset Name

        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', true);

        xhr.upload.onprogress = (e) => {
            const percent = Math.round((e.loaded / e.total) * 100);
            pBar.style.width = percent + '%';
            status.innerText = "अपलोडिंग: " + percent + "%";
        };

        xhr.onload = () => {
            const response = JSON.parse(xhr.responseText);
            if (xhr.status === 200) {
                status.innerText = "बधाई हो! विरासत जमा हो गई ✅";
                alert("सफ़रनामा: फोटो सफलतापूर्वक लाइब्रेरी के लिए भेज दी गई है!");
                location.reload();
            } else {
                // यह लाइन बताएगी कि असली एरर क्या है
                status.innerText = "गड़बड़: " + (response.error ? response.error.message : "Network Error");
                btn.disabled = false;
            }
        };

        xhr.send(formData);
    }
</script>
</body>
</html>
