<div id="direct-send" class="send-box" style="
    background: #1a1a2e; 
    padding: 40px 25px; 
    border-radius: 45px; 
    border: 3px solid #ffd700; 
    color: white; 
    text-align: center;
    margin-top: 20px;
">
    <h2 style="color: #ffd700; font-size: 30px; margin-bottom: 10px;">DIRECT DISPATCH</h2>
    <p style="opacity: 0.8; margin-bottom: 30px; font-weight: 600;">एक क्लिक में एड्रेस पाएं और हमसे जुड़ें</p>
    
    <div id="address-box" style="
        display: none; 
        background: #ffffff; 
        color: #1a1a2e; 
        padding: 25px; 
        border-radius: 25px; 
        margin-bottom: 25px; 
        text-align: left; 
        border: 4px solid #ffd700;
        box-shadow: 0 10px 30px rgba(255,215,0,0.2);
    ">
        <h4 style="margin: 0 0 10px 0; color: #e67e22; font-size: 18px;">🚩 इस पते पर किताब भेजें:</h4>
        <p style="margin: 0; font-weight: 800; line-height: 1.6; font-size: 15px;">
            <span style="color: #1a1a2e;">SST PRO HEAD OFFICE</span><br>
            [आपका पूरा नाम/ऑफिस नाम]<br>
            [गली/मोहल्ला/मकान नंबर]<br>
            [शहर, राज्य, पिन कोड]<br>
            संपर्क: +91 [आपका नंबर]
        </p>
    </div>

    <input type="text" id="book_info" style="width: 85%; padding: 18px; margin-bottom: 15px; border-radius: 15px; border: none; font-weight: 800;" placeholder="किताब का नाम (उदा: Class 10 History)">
    
    <input type="text" id="sst_user_id" style="width: 85%; padding: 18px; margin-bottom: 25px; border-radius: 15px; border: none; font-weight: 800;" placeholder="अपनी SST ID लिखें">

    <button onclick="connectNow()" style="
        background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
        color: white; 
        width: 100%; 
        padding: 22px; 
        border: none; 
        border-radius: 20px; 
        font-weight: 950; 
        font-size: 20px; 
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
    ">
        WHATSAPP पर एड्रेस प्राप्त करें 💬
    </button>
</div>

<script>
function connectNow() {
    var book = document.getElementById('book_info').value;
    var id = document.getElementById('sst_user_id').value;

    if(book == "" || id == "") {
        alert("भाई, पहले किताब का नाम और अपनी ID तो भर दो!");
        return;
    }

    // 1. स्क्रीन पर एड्रेस दिखाओ
    document.getElementById('address-box').style.display = "block";
    
    // 2. व्हाट्सएप मैसेज लिंक बनाओ
    var myNumber = "91XXXXXXXXXX"; // 🚩 यहाँ अपना मोबाइल नंबर डालें (91 के साथ)
    var text = "नमस्ते SST Pro टीम!🚩%0A%0A" +
               "मैं *सफ़रनामा* मिशन के तहत अपनी किताब भेजना चाहता हूँ।%0A%0A" +
               "*किताब:* " + book + "%0A" +
               "*SST ID:* " + id + "%0A%0A" +
               "मैंने स्क्रीन पर एड्रेस देख लिया है, कृपया मुझे आगे की प्रक्रिया बताएं।";

    // 3. व्हाट्सएप खोलो
    window.open("https://wa.me/" + myNumber + "?text=" + text, "_blank");
}
</script>
