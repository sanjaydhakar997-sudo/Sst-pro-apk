<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civics Chapters List - Class 10</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; padding-bottom: 50px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Premium Gradient Header */
        .app-header { 
            background: linear-gradient(135deg, #1e1b4b, #311042, #701a2f); 
            color: white; 
            padding: 45px 24px; 
            text-align: center; 
            border-bottom-left-radius: 35px; 
            border-bottom-right-radius: 35px; 
            box-shadow: 0 10px 25px rgba(30, 27, 75, 0.25); 
        }
        .app-header h1 { font-size: 26px; margin: 0; font-weight: 900; letter-spacing: 0.5px; }
        .app-header p { font-size: 14px; margin: 8px 0 0 0; opacity: 0.85; font-weight: 600; }
        
        .content-area { padding: 20px 15px; }
        
        /* Shandar Chapter Card Link Box */
        .chapter-link-card { 
            background: #ffffff; 
            border-radius: 20px; 
            padding: 22px; 
            margin-bottom: 18px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            transition: all 0.2s ease;
            border-left: 6px solid #e11d48;
        }
        .chapter-link-card:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        .chapter-text { display: flex; flex-direction: column; gap: 4px; }
        .chapter-text h3 { font-size: 18px; font-weight: 800; color: #0f172a; margin: 0; }
        .chapter-text p { font-size: 13px; color: #64748b; margin: 0; font-weight: 600; }
        
        .arrow-icon { background: #ffe4e6; color: #e11d48; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; flex-shrink: 0; }

        .back-btn { display: flex; align-items: center; justify-content: center; background: #ffffff; color: #475569; padding: 16px; border-radius: 30px; font-size: 15px; font-weight: 700; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 90%; margin: 40px auto 0 auto; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .back-btn:active { transform: scale(0.97); background: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1>📚 विषय: राजनीति विज्ञान</h1>
        <p>कक्षा 10 • सम्पूर्ण अध्यायवार सूची</p>
    </div>

    <div class="content-area">

        <!-- CHAPTER 1 LINK (Nayi Bani civics1.html Se Connect Kar Diya Hai) -->
        <a href="civics1.html" class="chapter-link-card">
            <div class="chapter-text">
                <h3>अध्याय 1: सत्ता की साझेदारी</h3>
                <p>वीडियो क्लासेज और हस्तलिखित नोट्स देखें</p>
            </div>
            <div class="arrow-icon">➔</div>
        </a>

        <!-- CHAPTER 2 LINK -->
        <a href="civics2.html" class="chapter-link-card" style="border-left-color: #94a3b8; opacity: 0.7;">
            <div class="chapter-text">
                <h3>अध्याय 2: संघवाद</h3>
                <p>जल्द आ रहा है...</p>
            </div>
            <div class="arrow-icon">⏳</div>
        </a>

        <!-- CHAPTER 3 LINK -->
        <a href="civics3.html" class="chapter-link-card" style="border-left-color: #94a3b8; opacity: 0.7;">
            <div class="chapter-text">
                <h3>अध्याय 3: जाति, धर्म और लैंगिक मसले</h3>
                <p>जल्द आ रहा है...</p>
            </div>
            <div class="arrow-icon">⏳</div>
        </a>

        <!-- Floating Back Button -->
        <a href="class10-sst.html" class="back-btn">🔙 मुख्य मेनू पर वापस जाएं</a>
    </div>
</div>

<script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
</body>
</html>
