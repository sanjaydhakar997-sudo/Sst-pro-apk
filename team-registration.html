<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - Ground Executive Selection</title>
    <style>
        :root { --primary: #1a237e; --secondary: #283593; --accent: #ffd700; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; margin: 0; padding: 15px; color: #fff; }
        
        /* मज़बूत हेडर */
        .header-section { text-align: center; padding: 30px 10px; background: linear-gradient(135deg, #1a237e, #000); border-radius: 25px; margin-bottom: 20px; border-bottom: 4px solid var(--accent); }
        .header-section h1 { font-size: 26px; margin: 0; letter-spacing: 1px; color: var(--accent); }
        .header-section p { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        /* सिलेक्शन कार्ड */
        .form-card { background: #fff; color: #333; border-radius: 30px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        
        .badge { background: var(--primary); color: #fff; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 15px; }

        .input-box { margin-bottom: 18px; }
        .input-box label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; }
        .input-box input, .input-box textarea { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 16px; box-sizing: border-box; background: #f8fafc; }
        .input-box input:focus { border-color: var(--primary); outline: none; background: #fff; }

        /* फौलादी बटन */
        .power-btn { width: 100%; background: linear-gradient(135deg, #1a237e, #283593); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 15px rgba(26, 35, 126, 0.3); text-transform: uppercase; transition: 0.3s; }
        .power-btn:active { transform: scale(0.96); }

        /* बधाई का गुप्त बॉक्स */
        #success-overlay { display: none; text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 60px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header-section">
            <p>TEAM SOCIAL STUDIES CLASSES</p>
            <h1>GROUND EXECUTIVE</h1>
            <p>एक गाँव • एक लीडर • एक मिशन</p>
        </div>

        <div class="form-card">
            <div class="badge">OFFICIAL SELECTION 2026</div>
            
            <form id="execForm">
                <div class="input-box">
                    <label>आपका शुभ नाम</label>
                    <input type="text" id="name" placeholder="Name" required>
                </div>

                <div class="input-box">
                    <label>WhatsApp नंबर</label>
                    <input type="tel" id="phone" placeholder="98XXXXXXXX" required>
                </div>

                <div class="input-box">
                    <label>जिला और तहसील</label>
                    <input type="text" id="dist" placeholder="Chittorgarh, Nimbahera" required>
                </div>

                <div class="input-box">
                    <label>आपके गाँव का नाम</label>
                    <input type="text" id="village" placeholder="Village Name" required>
                </div>

                <div class="input-box">
                    <label>आप गाँव की मदद कैसे करेंगे?</label>
                    <textarea id="aim" rows="2" placeholder="अपना विज़न लिखें..."></textarea>
                </div>

                <button type="button" onclick="finalizeAction()" class="power-btn">जॉइन टीम SST PRO</button>
            </form>
        </div>
    </div>

    <div id="success-overlay">
        <div class="success-icon">🚩</div>
        <h1 style="color: var(--accent);">बधाई हो, सिपाही!</h1>
        <p style="font-size: 18px;">आपका आवेदन <b>SST PRO TEAM</b> के मुख्य सर्वर में सुरक्षित जमा कर लिया गया है।</p>
        <p style="opacity: 0.7;">जल्द ही आपसे संपर्क किया जाएगा।</p>
        <button onclick="window.location.href='index.html'" class="power-btn" style="margin-top:20px; background: #fff; color: #1a237e;">वापस ऐप पर चलें</button>
    </div>

    <script>
        function finalizeAction() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const v = document.getElementById('village').value;

            if(n && p && v) {
                // फॉर्म छुपाओ, बधाई दिखाओ
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('success-overlay').style.display = 'block';
                
                // यहाँ बैकग्राउंड में डेटा भेजने का काम आप बाद में जोड़ सकते हैं
                console.log("Data Captured: ", n, p, v);
            } else {
                alert("मिशन में शामिल होने के लिए पूरी जानकारी भरें!");
            }
        }
    </script>
</body>
</html>
