<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - Ground Executive Registration</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd700; }
        body { font-family: 'Poppins', sans-serif; background: #0f172a; margin: 0; padding: 15px; color: #fff; }
        
        /* मज़बूत और बोल्ड हेडर */
        .header-section { 
            text-align: center; padding: 35px 10px; 
            background: linear-gradient(135deg, #1a237e, #000); 
            border-radius: 25px; margin-bottom: 20px; 
            border-bottom: 5px solid var(--accent); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .header-section span { 
            font-size: 13px; font-weight: 800; letter-spacing: 2px; 
            color: #fff; text-transform: uppercase; display: block; margin-bottom: 5px;
        }
        .header-section h1 { font-size: 28px; margin: 0; color: var(--accent); font-weight: 900; }

        .form-card { background: #fff; color: #333; border-radius: 30px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        .input-box { margin-bottom: 15px; }
        .input-box label { display: block; font-weight: 800; font-size: 12px; margin-bottom: 6px; color: var(--primary); text-transform: uppercase; }
        .input-box input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 16px; box-sizing: border-box; background: #f8fafc; }
        
        /* Preamble with Indian Flag */
        .preamble-box { 
            background: #fff9c4; border: 2px dashed #fbc02d; padding: 15px; 
            border-radius: 15px; margin: 25px 0; text-align: center; 
        }
        .flag-colors { display: flex; justify-content: center; gap: 3px; margin-bottom: 10px; }
        .flag-dot { width: 30px; height: 5px; border-radius: 2px; }
        
        .preamble-text { font-style: italic; font-size: 14px; line-height: 1.6; color: #333; font-weight: 600; }
        
        .nara { font-size: 16px; font-weight: 900; color: #1a237e; margin-top: 10px; display: block; }

        .power-btn { 
            width: 100%; background: linear-gradient(135deg, #1a237e, #283593); color: white; 
            border: none; padding: 18px; border-radius: 18px; font-size: 18px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="header-section">
            <span>TEAM SOCIAL STUDIES CLASSES</span>
            <h1>GROUND EXECUTIVE</h1>
        </div>

        <div class="form-card">
            <form id="missionForm">
                <div class="input-box">
                    <label>पूरा नाम</label>
                    <input type="text" id="name" placeholder="Name" required>
                </div>

                <div class="input-box">
                    <label>WhatsApp नंबर</label>
                    <input type="tel" id="phone" placeholder="98XXXXXXXX" required>
                </div>

                <div class="input-box">
                    <label>पूरा पता (गाँव/मोहल्ला/शहर)</label>
                    <input type="text" id="address" placeholder="गली, मकान नं, गाँव" required>
                </div>

                <div class="input-box">
                    <label>जिला</label>
                    <input type="text" id="dist" placeholder="District" required>
                </div>

                <div class="input-box">
                    <label>आपकी हॉबी (Hobby)</label>
                    <input type="text" id="hobby" placeholder="आपकी रुचि क्या है?" required>
                </div>

                <div class="preamble-box">
                    <div class="flag-colors">
                        <div style="background:#FF9933" class="flag-dot"></div>
                        <div style="background:#fff; border:1px solid #ddd" class="flag-dot"></div>
                        <div style="background:#138808" class="flag-dot"></div>
                    </div>
                    <div class="preamble-text">
                        "मैं शपथ लेता हूँ कि मेरे गाँव और शहर के हर घर तक शिक्षा की रोशनी पहुँचाने में मैं टीम का साथ दूँगा।"
                    </div>
                    <span class="nara">मज़बूत भारत, सशक्त युवा! 🇮🇳</span>
                    <p style="margin:5px 0 0 0; font-weight:bold; color:#555;">जय हिन्द!</p>
                </div>

                <button type="button" onclick="submitMission()" class="power-btn">शपथ स्वीकार करें</button>
            </form>
        </div>
    </div>

    <div id="success-page" style="display:none; text-align:center; padding:50px 20px;">
        <h1 style="font-size: 80px;">🚩</h1>
        <h2 style="color: #ffd700;">बधाई हो, सिपाही!</h2>
        <p>आपका संकल्प स्वीकार कर लिया गया है।</p>
        <button onclick="window.location.href='index.html'" class="power-btn" style="background:#fff; color:#1a237e; margin-top:20px;">होम पर जाएं</button>
    </div>

    <script>
        function submitMission() {
            const fields = ['name', 'phone', 'address', 'dist', 'hobby'];
            let valid = true;
            fields.forEach(id => { if(!document.getElementById(id).value) valid = false; });

            if(valid) {
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('success-page').style.display = 'block';
            } else {
                alert("मिशन जॉइन करने के लिए पूरी जानकारी भरें!");
            }
        }
    </script>
</body>
</html>
