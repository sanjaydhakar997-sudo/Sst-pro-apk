<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join SST PRO TEAM | Ground Executive</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1a237e; font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; color: #666; }

        .form-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #1a237e; }
        .input-group input, .input-group textarea, .input-group select { 
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: 0.3s;
        }
        .input-group input:focus { border-color: #1a237e; outline: none; }

        .submit-btn { 
            width: 100%; background: linear-gradient(135deg, #1a237e, #283593); color: white; border: none; 
            padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:active { transform: scale(0.98); }

        .info-box { background: #e8eaf6; padding: 15px; border-radius: 12px; margin-bottom: 25px; border-left: 5px solid #1a237e; }
        .info-box p { margin: 0; font-size: 13px; line-height: 1.5; color: #1a237e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SST PRO TEAM</h1>
        <p>Mission: 0% Margin - Ground Executive Recruitment</p>
    </div>

    <div class="form-container">
        <div class="info-box">
            <p><strong>ध्यान दें:</strong> यह कोई नौकरी नहीं, एक सेवा मिशन है। हम हर गाँव से केवल एक ही मज़बूत <b>Ground Executive</b> चुनेंगे।</p>
        </div>

        <form>
            <div class="input-group">
                <label>पूरा नाम</label>
                <input type="text" placeholder="आपका नाम लिखें" required>
            </div>

            <div class="input-group">
                <label>WhatsApp नंबर</label>
                <input type="tel" placeholder="98XXXXXXXX" required>
            </div>

            <div class="input-group">
                <label>आपका जिला</label>
                <input type="text" placeholder="जैसे: चित्तौड़गढ़" required>
            </div>

            <div class="input-group">
                <label>गाँव का नाम</label>
                <input type="text" placeholder="अपने गाँव का नाम लिखें" required>
            </div>

            <div class="input-group">
                <label>आप टीम की मदद कैसे करेंगे?</label>
                <textarea rows="3" placeholder="यहाँ संक्षेप में लिखें..."></textarea>
            </div>

            <button type="submit" class="submit-btn">आवेदन जमा करें</button>
        </form>
    </div>

</body>
</html>
