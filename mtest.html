<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - Sanjay Sir Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --accent: #ffd700; --success: #2ecc71; --error: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Hind', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }

        /* प्रोफेशनल हेडर */
        .header { width: 100%; max-width: 500px; background: linear-gradient(135deg, var(--primary), #0d47a1); color: white; text-align: center; padding: 25px 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-bottom: 5px solid var(--accent); margin-bottom: 25px; box-sizing: border-box; }
        
        .card { width: 100%; max-width: 500px; background: white; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); box-sizing: border-box; text-align: center; border: 1px solid #e0e0e0; }
        
        /* इनपुट और फॉर्म स्टाइल */
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; color: #555; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 14px; border: 2px solid #eaeff5; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }

        .instruction-box { background: #fffde7; border-left: 5px solid var(--accent); padding: 15px; text-align: left; border-radius: 10px; margin-bottom: 25px; font-size: 14px; color: #444; }

        .btn-main { background: linear-gradient(to right, var(--primary), #3949ab); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        /* क्विज ऑप्शन स्टाइल */
        .option { background: #f8f9fa; border: 2px solid #eee; padding: 15px; margin-bottom: 12px; border-radius: 15px; cursor: pointer; text-align: left; font-weight: 500; display: flex; justify-content: space-between; transition: 0.2s; }
        .option.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .option.wrong { background: var(--error) !important; color: white; border-color: var(--error); }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 25px; }
        .btn-nav { padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }

        #result-screen { display: none; }
        .medal { font-size: 60px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">Social Studies Classes</h1>
        <p style="margin:5px 0 0; font-size:14px; opacity:0.9;">संजय सर: ऑनलाइन टेस्ट सीरीज</p>
    </div>

    <div id="screen-reg" class="card">
        <h2 style="color:var(--primary); margin-top:0;">विद्यार्थी पंजीकरण</h2>
        <div class="instruction-box">
            <strong>📢 ध्यान दें:</strong> अपना सही नाम और जिला भरें ताकि टॉपर्स की लिस्ट में आपका नाम सही से आ सके।
        </div>
        <div class="input-group">
            <label>आपका शुभ नाम</label>
            <input type="text" id="u-name" placeholder="नाम यहाँ लिखें...">
        </div>
        <div class="input-group">
            <label>आपका जिला</label>
            <input type="text" id="u-dist" placeholder="जिला यहाँ लिखें...">
        </div>
        <button class="btn-main" onclick="showTags()">आगे बढ़ें →</button>
    </div>

    <div id="screen-tags" class="card" style="display:none;">
        <h3 style="color:var(--primary);">🎯 यह टेस्ट किसके लिए है?</h3>
        <div style="margin:15px 0;">
            <span style="background:var(--primary); color:white; padding:5px 12px; border-radius:50px; font-size:12px; margin:3px; display:inline-block;">REET L-1 & L-2</span>
            <span style="background:var(--primary); color:white; padding:5px 12px; border-radius:50px; font-size:12px; margin:3px; display:inline-block;">CET</span>
            <span style="background:var(--primary); color:white; padding:5px 12px; border-radius:50px; font-size:12px; margin:3px; display:inline-block;">2nd Grade</span>
            <span style="background:var(--primary); color:white; padding:5px 12px; border-radius:50px; font-size:12px; margin:3px; display:inline-block;">Rajasthan Police</span>
        </div>
        <button class="btn-main" onclick="startQuiz()">टेस्ट शुरू करें 🚀</button>
    </div>

    <div id="screen-quiz" class="card" style="display:none;">
        <div id="q-count" style="font-weight:700; color:var(--primary); margin-bottom:10px;"></div>
        <div id="question" style="font-size:19px; font-weight:600; text-align:left; margin-bottom:20px;">लोड हो रहा है...</div>
        <div id="options-box"></div>
        
        <div class="nav-grid">
            <button id="btn-prev" class="btn-nav" style="background:#ddd;" onclick="goBack()">Back</button>
            <button id="btn-skip" class="btn-nav" style="background:#fff3e0; color:#e65100;" onclick="goSkip()">Skip</button>
            <button id="btn-next" class="btn-nav" style="background:var(--primary); color:white;" onclick="goNext()">Next</button>
        </div>
    </div>

    <div id="screen-result" class="card">
        <div id="medal" class="medal">🏆</div>
        <h2 id="res-name" style="margin:0;">नाम</h2>
        <p id="res-dist" style="color:#666; margin-bottom:20px;">जिला</p>
        <div style="border: 2px solid var(--primary); padding:20px; border-radius:20px; background:#f8f9fa; margin-bottom:20px;">
            <div style="font-size:14px; color:#555;">आपका कुल स्कोर</div>
            <div id="res-score" style="font-size:50px; font-weight:800; color:var(--primary);">0/0</div>
        </div>
        <p id="res-msg" style="font-weight:600; color:#333;"></p>
        <button class="btn-main" onclick="location.reload()">दोबारा टेस्ट दें</button>
    </div>

<script>
    // आपका गूगल शीट लिंक यहाँ फिट कर दिया गया है
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyjgh5VuLxdek4DeE-l6wsBFi9KWhhD6VPmhkZTYxkzEO3tmg0KwKxVzqwwBqg5CP2_/exec'; 

    const questions = [
        { q: "मानसून शब्द की उत्पत्ति किस भाषा से हुई है?", options: ["अरबी", "फारसी", "लैटिन", "ग्रीक"], a: 0 },
        { q: "राजस्थान का सबसे आर्द्र स्थान कौन सा है?", options: ["झालावाड़", "माउंट आबू", "बांसवाड़ा", "कोटा"], a: 1 },
        { q: "मावट की वर्षा कौन सी फसल के लिए लाभदायक है?", options: ["बाजरा", "मक्का", "गेहूँ", "ज्वार"], a: 2 }
        // यहाँ अपने बाकी सवाल इसी तरह जोड़ें...
    ];

    let current = 0; let score = 0; let userAns = []; 
    let uName = ""; let uDist = "";

    function showTags() {
        uName = document.getElementById('u-name').value;
        uDist = document.getElementById('u-dist').value;
        if(!uName || !uDist) { alert("कृपया नाम और जिला लिखें!"); return; }
        document.getElementById('screen-reg').style.display = 'none';
        document.getElementById('screen-tags').style.display = 'block';
    }

    function startQuiz() {
        document.getElementById('screen-tags').style.display = 'none';
        document.getElementById('screen-quiz').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const qData = questions[current];
        document.getElementById('q-count').innerText = `प्रश्न: ${current + 1} / ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        qData.options.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option' + (userAns[current] !== undefined ? (i === qData.a ? ' correct' : (i === userAns[current] ? ' wrong' : '')) : '');
            div.innerHTML = `<span>${String.fromCharCode(65+i)}. ${opt}</span>`;
            div.onclick = () => { if(userAns[current] === undefined) { userAns[current] = i; if(i === qData.a) score++; showQuestion(); } };
            box.appendChild(div);
        });
        document.getElementById('btn-prev').disabled = current === 0;
        document.getElementById('btn-next').disabled = userAns[current] === undefined;
        document.getElementById('btn-next').innerText = (current === questions.length - 1) ? "Finish" : "Next";
    }

    function goNext() { if(current < questions.length - 1) { current++; showQuestion(); } else { finish(); } }
    function goBack() { current--; showQuestion(); }
    function goSkip() { if(userAns[current] === undefined) { userAns[current] = -1; goNext(); } }

    function finish() {
        // डेटा गूगल शीट पर भेजना
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ name: uName, district: uDist, score: `${score}/${questions.length}` }),
            headers: { 'Content-Type': 'application/json' }
        });
        
        document.getElementById('screen-quiz').style.display = 'none';
        document.getElementById('screen-result').style.display = 'block';
        document.getElementById('res-name').innerText = uName;
        document.getElementById('res-dist').innerText = uDist;
        document.getElementById('res-score').innerText = `${score} / ${questions.length}`;
        
        let p = (score/questions.length)*100;
        document.getElementById('res-msg').innerText = p >= 80 ? "अद्भुत तैयारी!" : "कोशिश जारी रखें!";
    }
</script>
</body>
</html>
