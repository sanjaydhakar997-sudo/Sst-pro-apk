<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Premium Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1a237e; 
            --accent: #ffd700; 
            --success: #2ecc71; 
            --error: #e74c3c; 
            --bg: #f0f2f5; 
            --dark-blue: #000051;
        }

        body { 
            font-family: 'Hind', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px 0;
            min-height: 100vh; 
        }

        /* प्रीमियम एनिमेटेड हेडर */
        .top-brand {
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--dark-blue));
            color: white;
            padding: 20px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-bottom: 4px solid var(--accent);
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tagline {
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            animation: pulse 2s infinite;
        }

        .exam-info {
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .exam-scroller {
            overflow: hidden;
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            padding: 6px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .exam-scroller span {
            display: inline-block;
            padding-left: 100%;
            animation: scrollText 15s linear infinite;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* क्विज कार्ड स्टाइल */
        .quiz-card { 
            width: 90%; 
            max-width: 500px; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            animation: slideUp 0.6s ease; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        h2 { 
            color: var(--primary); 
            text-align: center; 
            font-size: 20px; 
            margin-bottom: 20px; 
            padding-bottom: 10px;
            border-bottom: 2px dashed #ddd;
        }

        .question { 
            font-size: 20px; 
            font-weight: 600; 
            margin-bottom: 20px; 
            color: #2d3436; 
            line-height: 1.4;
        }

        .option { 
            background: #f8f9fa; 
            border: 2px solid #edeff2; 
            padding: 14px 18px; 
            margin: 12px 0; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 17px; 
            font-weight: 500;
        }

        .option:hover { 
            border-color: var(--accent); 
            background: #fffdf2;
            transform: translateX(5px);
        }

        .option.correct { 
            background: var(--success) !important; 
            color: white; 
            border-color: var(--success); 
            animation: bounce 0.5s;
        }

        .option.wrong { 
            background: var(--error) !important; 
            color: white; 
            border-color: var(--error); 
            animation: shake 0.4s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #progress { height: 10px; background: #dfe4ea; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #progress-bar { height: 100%; background: linear-gradient(to right, var(--accent), #ff9800); width: 0%; transition: 0.5s; }

        .score-card { text-align: center; display: none; }
        .score-card h3 { font-size: 26px; color: var(--primary); margin-bottom: 10px; }
        .btn-restart { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 25px; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(26, 35, 126, 0.3);
        }
    </style>
</head>
<body>

<div class="top-brand">
    <div class="tagline">Social Studies Classes</div>
    <div class="exam-info">🎯 महत्वपूर्ण प्रश्नोत्तरी (Quiz Series)</div>
    <div class="exam-scroller">
        <span>REET • 2nd Grade • CET • LDC • RPSC • RAS • SSC • All State Exams 2024-25</span>
    </div>
</div>

<div class="quiz-card">
    <h2 id="quiz-title">लोड हो रहा है...</h2>
    <div id="progress"><div id="progress-bar"></div></div>
    
    <div id="quiz-content"></div>

    <div id="result-area" class="score-card">
        <h3>आपका फाइनल स्कोर</h3>
        <div id="final-score" style="font-size: 60px; font-weight: bold; color: var(--success);">0</div>
        <p style="font-size: 18px; color: #555;">शानदार प्रयास! आपकी तैयारी सही दिशा में है।</p>
        <button class="btn-restart" onclick="location.reload()">दोबारा शुरू करें</button>
    </div>
</div>

<script>
    // आपका डाटा (50 सवाल)
    const data = {
        "mansoon": {
            name: "भारतीय मानसून: 50 महत्वपूर्ण प्रश्न",
            qs: [
                { q: "मानसून शब्द की उत्पत्ति किस भाषा से हुई है?", options: ["अरबी", "फारसी", "हिंदी", "अंग्रेजी"], a: 0 },
                { q: "भारत में मानसून सबसे पहले किस राज्य में आता है?", options: ["राजस्थान", "केरल", "महाराष्ट्र", "गुजरात"], a: 1 },
                { q: "मानसून को ऊर्जा देने वाला 'इंजन' किसे कहा जाता है?", options: ["हिमालय", "थार मरुस्थल", "हिंद महासागर", "तिब्बत पठार"], a: 1 },
                { q: "पेड़ों के नीचे ठंडक का अनुभव किस कारण होता है?", options: ["वाष्पीकरण", "वाष्पोत्सर्जन", "प्रकाश संश्लेषण", "छाया"], a: 1 },
                { q: "भारत में सबसे ज्यादा वर्षा किस मानसून से होती है?", options: ["उत्तर-पूर्वी", "दक्षिण-पश्चिम", "पश्चिमी विक्षोभ", "चक्रवात"], a: 1 },
                { q: "अक्टूबर-नवंबर में वर्षा कहाँ अधिक होती है?", options: ["पंजाब", "तमिलनाडु तट", "असम", "गुजरात"], a: 1 },
                { q: "मासिनराम किस राज्य में स्थित है?", options: ["असम", "मेघालय", "सिक्किम", "त्रिपुरा"], a: 1 },
                { q: "काल बैसाखी कहाँ का स्थानीय तूफान है?", options: ["राजस्थान", "पश्चिम बंगाल", "केरल", "पंजाब"], a: 1 },
                { q: "आम्र वर्षा (Mango Shower) कहाँ होती है?", options: ["यूपी", "केरल-कर्नाटक", "बिहार", "हरियाणा"], a: 1 },
                { q: "भारत का सबसे शुष्क स्थान कौन सा है?", options: ["जैसलमेर", "लेह", "बीकानेर", "जोधपुर"], a: 1 },
                { q: "अक्टूबर की गर्मी (October Heat) का मुख्य कारण क्या है?", options: ["उच्च तापमान और आर्द्रता", "साफ़ आसमान", "धीमी हवा", "ठंडी पवनें"], a: 0 },
                { q: "मानसून का 'विस्फोट' किसे कहते हैं?", options: ["हल्की वर्षा", "तेज गर्जना के साथ वर्षा", "मानसून लौटना", "सूखा"], a: 1 },
                { q: "उत्तर-पूर्वी मानसून से सबसे ज्यादा वर्षा कहाँ होती है?", options: ["मुंबई", "कोलकाता", "चेन्नई", "दिल्ली"], a: 2 },
                { q: "आईटीसीजेड (ITCZ) का पूरा नाम क्या है?", options: ["Inner Zone", "Convergence Zone", "Climate Zone", "Center Zone"], a: 1 },
                { q: "सर्दियों में उत्तर-पश्चिम भारत में वर्षा का कारण?", options: ["लौटता मानसून", "पश्चिमी विक्षोभ", "चक्रवात", "स्थानीय पवन"], a: 1 },
                { q: "राजस्थान में कम वर्षा का कारण अरावली की स्थिति क्या है?", options: ["लम्बवत", "समानांतर", "विपरीत", "कोई नहीं"], a: 1 },
                { q: "कॉफी वर्षा (Cherry Blossom) कहाँ होती है?", options: ["कर्नाटक", "असम", "ओडिशा", "गुजरात"], a: 0 },
                { q: "मानसून ब्रेक (Monsoon Break) क्या है?", options: ["वर्षा का रुकना", "वर्षा का बढ़ना", "तूफान आना", "ठंड बढ़ना"], a: 0 },
                { q: "भारत की जलवायु मुख्य रूप से कैसी है?", options: ["विषुवतीय", "मानसूनी", "ध्रुवीय", "सवाना"], a: 1 },
                { q: "अरावली पर्वतमाला की दिशा क्या है?", options: ["उत्तर-दक्षिण", "दक्षिण पश्चिम-उत्तर पूर्व", "पूर्व-पश्चिम", "उत्तर पश्चिम-दक्षिण पूर्व"], a: 1 },
                { q: "मानसून पूर्व की वर्षा को बंगाल में क्या कहते हैं?", options: ["काल बैसाखी", "लू", "मावट", "चाय वर्षा"], a: 0 },
                { q: "अंडमान निकोबार में मानसून कब पहुँचता है?", options: ["1 मई", "20 मई", "1 जून", "15 जून"], a: 1 },
                { q: "एल-नीनो का भारतीय मानसून पर प्रभाव?", options: ["अच्छी वर्षा", "कम वर्षा/सूखा", "कोई प्रभाव नहीं", "तूफान"], a: 1 },
                { q: "ला-नीना का प्रभाव कैसा होता है?", options: ["अत्यधिक वर्षा", "कम वर्षा", "सामान्य", "सूखा"], a: 0 },
                { q: "मानसून का जुआ किसे कहा जाता है?", options: ["भारतीय व्यापार", "भारतीय कृषि", "उद्योग", "शेयर बाजार"], a: 1 },
                { q: "अरब सागर की मानसून शाखा सबसे पहले कहाँ पहुँचती है?", options: ["केरल", "गुजरात", "महाराष्ट्र", "गोवा"], a: 0 },
                { q: "तमिलनाडु में शीतकालीन वर्षा का कारण?", options: ["उत्तर-पूर्वी मानसून", "दक्षिण-पश्चिम", "पश्चिमी विक्षोभ", "स्थानीय"], a: 0 },
                { q: "समुद्र समीर (Sea Breeze) कब चलती है?", options: ["रात में", "दिन में", "दोनों", "कभी नहीं"], a: 1 },
                { q: "जेट स्ट्रीम पवनें कहाँ चलती हैं?", options: ["क्षोभमंडल", "समतापमंडल", "मध्यमंडल", "ऊपरी क्षोभमंडल"], a: 3 },
                { q: "मानसून की सबसे लंबी अवधि कहाँ होती है?", options: ["राजस्थान", "केरल", "बिहार", "हरियाणा"], a: 1 },
                { q: "भारत में औसत वर्षा कितनी है?", options: ["100cm", "118cm", "150cm", "200cm"], a: 1 },
                { q: "वर्षा मापने के यंत्र को क्या कहते हैं?", options: ["बैरोमीटर", "रेन गेज", "हाइग्रोमीटर", "एनीमोमीटर"], a: 1 },
                { q: "पर्वतीय वर्षा सबसे अधिक कहाँ होती है?", options: ["मैदानों में", "पहाड़ों के ढलान पर", "पठार पर", "रेगिस्तान में"], a: 1 },
                { q: "लू किस प्रकार की पवन है?", options: ["ठंडी", "गर्म और शुष्क", "आर्द्र", "स्थायी"], a: 1 },
                { q: "मावट की वर्षा किस फसल के लिए अमृत है?", options: ["बाजरा", "गेहूँ", "कपास", "मक्का"], a: 1 },
                { q: "मानसून द्रोणी (Trough) का खिसकना क्या लाता है?", options: ["वर्षा", "सूखा", "सर्दियाँ", "गर्मी"], a: 0 },
                { q: "तिब्बत का पठार मानसून के लिए कैसा काम करता है?", options: ["हीटर", "कूलर", "बाधा", "कोई नहीं"], a: 0 },
                { q: "मानसून के लौटने को क्या कहते हैं?", options: ["निवर्तन", "आगमन", "विस्फोट", "विक्षेप"], a: 0 },
                { q: "भारत में वर्षा का वितरण कैसा है?", options: ["समान", "असमान", "स्थिर", "निश्चित"], a: 1 },
                { q: "किस द्वीप पर भारत का एकमात्र सक्रिय ज्वालामुखी है?", options: ["लक्षद्वीप", "बैरन द्वीप", "नील द्वीप", "हैवलॉक"], a: 1 },
                { q: "पश्चिमी विक्षोभ कहाँ से उत्पन्न होता है?", options: ["अरब सागर", "भूमध्य सागर", "बंगाल की खाड़ी", "हिंद महासागर"], a: 1 },
                { q: "दक्षिण-पश्चिम मानसून कब समाप्त होता है?", options: ["अगस्त", "सितंबर", "अक्टूबर", "नवंबर"], a: 1 },
                { q: "भारत का सबसे आर्द्र स्थान?", options: ["लेह", "मासिनराम", "चेरापूंजी", "शिमला"], a: 1 },
                { q: "नार्वेस्टर कहाँ चलते हैं?", options: ["राजस्थान", "ओडिशा/बंगाल", "पंजाब", "तमिलनाडु"], a: 1 },
                { q: "कोपेन ने जलवायु को कितने भागों में बाँटा?", options: ["2", "4", "5", "8"], a: 2 },
                { q: "थार्नवेट के अनुसार राजस्थान का अधिकांश भाग?", options: ["CA'w", "DA'w", "EA'd", "DB'w"], a: 2 },
                { q: "भारत में सबसे कम वर्षा वाला जिला?", options: ["जैसलमेर", "लेह", "कच्छ", "बीकानेर"], a: 1 },
                { q: "मानसून की खोज किसने की थी?", options: ["हिप्पोलस", "अरस्तु", "हम्बोल्ट", "इरेटोस्थनीज"], a: 0 },
                { q: "पुरवैया पवनें किस दिशा से आती हैं?", options: ["पश्चिम", "पूर्व", "उत्तर", "दक्षिण"], a: 1 },
                { q: "क्या मानसून एक स्थायी पवन है?", options: ["हाँ", "नहीं (सामयिक है)", "शायद", "कह नहीं सकते"], a: 1 }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type') || 'mansoon';
    const test = data[type];
    let currentQ = 0; let score = 0;

    function init() {
        if(!test) return;
        document.getElementById('quiz-title').innerText = test.name;
        showQuestion();
    }

    function showQuestion() {
        const qData = test.qs[currentQ];
        let html = `<div class="question">${currentQ + 1}. ${qData.q}</div>`;
        qData.options.forEach((opt, i) => {
            html += `<div class="option" onclick="check(${i})">${opt}</div>`;
        });
        document.getElementById('quiz-content').innerHTML = html;
        document.getElementById('progress-bar').style.width = ((currentQ) / test.qs.length * 100) + "%";
    }

    function check(idx) {
        const options = document.querySelectorAll('.option');
        options.forEach(o => o.style.pointerEvents = 'none');
        if(idx === test.qs[currentQ].a) {
            options[idx].classList.add('correct'); score++;
        } else {
            options[idx].classList.add('wrong');
            options[test.qs[currentQ].a].classList.add('correct');
        }
        setTimeout(() => {
            currentQ++;
            if(currentQ < test.qs.length) showQuestion();
            else finish();
        }, 1000);
    }

    function finish() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/${test.qs.length}`;
    }

    init();
</script>
</body>
</html>
