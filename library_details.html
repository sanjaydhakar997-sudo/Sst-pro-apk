<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Library - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --dark-bg: #05050a; --royal-blue: #121225; }
        body { background: var(--dark-bg); font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 0; }

        .header-section { text-align: center; padding: 20px 10px; }
        .royal-line { 
            height: 2px; width: 60%; margin: auto;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            position: relative;
        }
        .royal-line::after {
            content: '🚩'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 14px;
        }
        h1 { color: var(--gold); font-size: 22px; text-transform: uppercase; letter-spacing: 2px; margin: 15px 0 5px; font-weight: 900; }

        .library-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; padding: 10px;
        }

        .book-card {
            background: var(--royal-blue); border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px; overflow: hidden; aspect-ratio: 9/16;
            position: relative; transition: 0.4s;
            opacity: 0; transform: scale(0.9);
            animation: popIn 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        @keyframes popIn { to { opacity: 1; transform: scale(1); } }

        .book-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3); }
        .book-img { width: 100%; height: 75%; object-fit: cover; }
        .book-info { padding: 6px; text-align: center; }
        .book-title { font-size: 11px; font-weight: 700; color: var(--gold); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-donor { font-size: 8px; color: #aaa; margin: 2px 0; }

        .divider { display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        .divider-line { height: 1px; width: 30%; background: rgba(255, 215, 0, 0.3); }
        .divider-icon { color: var(--gold); margin: 0 10px; font-size: 18px; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }

        .motivation-strip {
            background: linear-gradient(135deg, #b8860b, #ffd700);
            color: #000; padding: 12px; margin: 15px 0;
            font-weight: 900; font-size: 13px; text-align: center;
        }

        .view-btn {
            background: var(--gold); color: #000; font-size: 9px;
            padding: 4px 8px; border-radius: 3px; font-weight: 800;
            text-decoration: none; display: inline-block; margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="royal-line"></div>
        <h1>The Royal Library</h1>
        <div class="royal-line"></div>
    </div>

    <div class="library-grid" id="grid1"></div>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon">✦</div>
        <div class="divider-line"></div>
    </div>

    <div class="motivation-strip">
        "विरासत वही है जो किसी के काम आए।"
    </div>

    <div class="library-grid" id="grid2"></div>

    <script>
        const cloudName = "dppmrodwf";
        const tag = "sst_pro"; // Cloudinary में यही टैग होना चाहिए

        async function fetchBooks() {
            const grid1 = document.getElementById('grid1');
            const grid2 = document.getElementById('grid2');
            
            try {
                // Cloudinary से फोटो की लिस्ट मंगाना
                const response = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json`);
                const data = await response.json();
                
                const allBooks = data.resources;

                if(allBooks.length === 0) {
                    grid1.innerHTML = "<p style='grid-column: 1/3;'>अभी लाइब्रेरी में कोई किताब नहीं है।</p>";
                    return;
                }

                // फोटो को ग्रिड में सजाना
                allBooks.forEach((img, i) => {
                    const url = `https://res.cloudinary.com/${cloudName}/image/upload/v${img.version}/${img.public_id}.${img.format}`;
                    
                    // अगर फोटो 4 से ज्यादा हैं तो दूसरी ग्रिड में भेजें
                    const targetGrid = (i < 4) ? grid1 : grid2;

                    targetGrid.innerHTML += `
                        <div class="book-card" style="animation-delay: ${i * 0.1}s">
                            <img src="${url}" class="book-img">
                            <div class="book-info">
                                <p class="book-title">सफ़रनामा विरासत</p>
                                <p class="book-donor">By: SST Pro Donor</p>
                                <a href="${url}" target="_blank" class="view-btn">FULL VIEW</a>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.log("Error:", err);
                grid1.innerHTML = "<p style='grid-column: 1/3;'>सेटिंग्स चेक करें: 'Resource List' को चालू करें।</p>";
            }
        }

        fetchBooks();
    </script>

</body>
</html>
