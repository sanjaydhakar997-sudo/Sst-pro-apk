<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Library - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --dark-bg: #05050a; --royal-blue: #1a1a2e; }
        body { background: var(--dark-bg); font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 0; overflow-x: hidden; }

        /* टॉप सुंदर लाइन */
        .top-line {
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            height: 2px; width: 100%; margin-top: 20px;
        }
        .header-text {
            text-align: center; color: var(--gold); font-size: 28px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 3px; margin: 10px 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        /* किताबों का ग्रिड */
        .library-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; padding: 15px;
        }

        /* किताब का कार्ड */
        .book-card {
            background: var(--royal-blue); border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px; overflow: hidden; aspect-ratio: 9/16;
            position: relative; transition: all 0.4s ease;
            animation: fadeIn 0.8s ease forwards; opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .book-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2); }

        .book-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 1px solid var(--gold); }
        
        .book-info { padding: 10px; text-align: center; }
        .book-title { font-size: 14px; font-weight: 700; color: var(--gold); margin: 0; }
        .book-donor { font-size: 10px; color: #aaa; margin-top: 5px; }

        /* मोटिवेशन पट्टी */
        .motivation-strip {
            background: linear-gradient(45deg, #b8860b, #ffd700);
            color: #000; padding: 15px; margin: 25px 0;
            font-weight: 900; font-style: italic; font-size: 16px;
            text-align: center; box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transform: skewY(-1deg);
        }

        .read-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--gold); color: #000; font-size: 10px;
            padding: 5px 10px; border-radius: 5px; font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="top-line"></div>
    <h1 class="header-text">The Royal Library 🚩</h1>
    <p style="text-align: center; font-size: 12px; opacity: 0.7; margin-top: -10px;">ज्ञान की अनमोल विरासत</p>

    <div class="library-grid" id="grid1">
        </div>

    <div class="motivation-strip">
        "कलम की ताकत दुनिया की हर ताकत से बड़ी है।"
    </div>

    <div class="library-grid" id="grid2">
        </div>

    <script>
        const booksBatch1 = [
            { title: "Dummy Book 1", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+1", pdf: "#" },
            { title: "Dummy Book 2", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+2", pdf: "#" },
            { title: "Dummy Book 3", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+3", pdf: "#" },
            { title: "Dummy Book 4", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+4", pdf: "#" }
        ];

        const booksBatch2 = [
            { title: "Dummy Book 5", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+5", pdf: "#" },
            { title: "Dummy Book 6", donor: "SST Pro", img: "https://via.placeholder.com/900x1600/1a1a2e/ffd700?text=Book+6", pdf: "#" }
        ];

        function displayBooks(books, gridId) {
            const grid = document.getElementById(gridId);
            books.forEach((book, index) => {
                grid.innerHTML += `
                    <div class="book-card" style="animation-delay: ${index * 0.1}s">
                        <img src="${book.img}" class="book-img">
                        <div class="book-info">
                            <p class="book-title">${book.title}</p>
                            <p class="book-donor">By: ${book.donor}</p>
                            <a href="${book.pdf}" class="read-btn">READ</a>
                        </div>
                    </div>
                `;
            });
        }

        displayBooks(booksBatch1, 'grid1');
        displayBooks(booksBatch2, 'grid2');
    </script>

</body>
</html>
