<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Royal Library</title>
    <style>
        :root { --gold: #ffd700; --dark: #000; --royal: #1a1a2e; --card-bg: #ffffff; }
        body { background: #fdfae5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* 🚩 प्रीमियम हेडर */
        .lib-header {
            background: linear-gradient(180deg, var(--royal) 0%, #000 100%);
            padding: 40px 20px; text-align: center; border-bottom: 6px solid var(--gold); color: var(--gold);
        }

        .container { padding: 15px; max-width: 900px; margin: auto; }

        /* ✨ AI स्मार्ट सहायक (Search Box) */
        .ai-search-container {
            background: var(--royal); border: 3px solid var(--gold); border-radius: 20px;
            padding: 15px; margin-top: -30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .ai-label { color: var(--gold); font-size: 12px; font-weight: 900; margin-bottom: 8px; display: block; }
        .smart-input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--gold);
            padding: 12px; border-radius: 12px; color: #fff; font-weight: 700; outline: none; box-sizing: border-box;
        }

        /* 📚 Digital Book Shelf (ग्रिड डिजाइन) */
        .book-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px; margin-top: 30px;
        }

        .book-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); border: 1px solid #ddd;
            display: flex; flex-direction: column; transition: 0.3s;
        }

        .book-img-box { position: relative; width: 100%; height: 210px; background: #f0f0f0; }
        .book-img { width: 100%; height: 100%; object-fit: cover; }
        
        .book-info { padding: 10px; flex-grow: 1; text-align: center; }
        .book-title { font-size: 14px; font-weight: 900; color: var(--royal); margin-bottom: 4px; }
        .book-code { font-size: 11px; color: #666; font-weight: 700; }

        /* ⚡ Action Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 5px; padding: 10px; border-top: 1px solid #eee; }
        
        .btn-read { 
            background: var(--royal); color: var(--gold); text-align: center; 
            padding: 8px; text-decoration: none; font-size: 12px; font-weight: 800; border-radius: 8px;
        }
        .btn-request { 
            background: #fdfae5; color: var(--royal); text-align: center; 
            padding: 8px; text-decoration: none; font-size: 12px; font-weight: 800; border-radius: 8px;
            border: 1px solid var(--royal);
        }

        /* 🖼️ Full Screen Reader (यहीं पढ़ने के लिए) */
        #bookReader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
        }
        .reader-header { background: var(--royal); color: var(--gold); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: var(--gold); border: none; padding: 5px 15px; border-radius: 5px; font-weight: 900; cursor: pointer; }
        iframe { width: 100%; height: calc(100% - 60px); border: none; }
    </style>
</head>
<body>

    <div class="lib-header">
        <h1 style="margin:0; font-size: 28px;">THE ROYAL LIBRARY</h1>
        <p style="margin:5px 0 0 0; font-size: 12px; font-weight: 800; opacity: 0.8;">SST PRO: डिजिटल और मैनुअल भंडार 🚩</p>
    </div>

    <div class="container">
        <div class="ai-search-container">
            <span class="ai-label">✨ SST स्मार्ट सहायक (Search)</span>
            <input type="text" id="libSearch" class="smart-input" placeholder="जैसे: '10th Class' या 'History'...">
        </div>

        <div class="book-grid" id="bookGrid">
            
            <div class="book-card">
                <div class="book-img-box">
                    <img src="https://via.placeholder.com/160x210?text=History+Book" class="book-img">
                </div>
                <div class="book-info">
                    <div class="book-title">राजस्थान का इतिहास</div>
                    <div class="book-code">#HIS-01</div>
                </div>
                <div class="btn-group">
                    <button onclick="openReader('YOUR_GOOGLE_DRIVE_OR_PDF_LINK')" class="btn-read">📖 यहीं पढ़ें</button>
                    <a href="donor_details.html?book=HIS-01" class="btn-request">📦 डाक से मंगवाएं</a>
                </div>
            </div>

            <div class="book-card">
                <div class="book-img-box">
                    <img src="https://via.placeholder.com/160x210?text=Notes" class="book-img">
                </div>
                <div class="book-info">
                    <div class="book-title">Handmade Notes</div>
                    <div class="book-code">#UP-102</div>
                </div>
                <div class="btn-group">
                    <button onclick="openReader('PDF_LINK')" class="btn-read">📖 यहीं पढ़ें</button>
                    <a href="donor_details.html?book=UP-102" class="btn-request">📦 डाक से मंगवाएं</a>
                </div>
            </div>

        </div>
    </div>

    <div id="bookReader">
        <div class="reader-header">
            <span id="readingTitle" style="font-weight: 900;">SST Pro Reader</span>
            <button class="close-btn" onclick="closeReader()">CLOSE X</button>
        </div>
        <iframe id="pdfFrame" src=""></iframe>
    </div>

    <script>
        // सर्च फंक्शन (Real-time Search)
        document.getElementById('libSearch').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let cards = document.getElementsByClassName('book-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector('.book-title').innerText;
                if (title.toUpperCase().indexOf(filter) > -1) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });

        // Reader खोलना
        function openReader(url) {
            document.getElementById('pdfFrame').src = url;
            document.getElementById('bookReader').style.display = "block";
        }

        // Reader बंद करना
        function closeReader() {
            document.getElementById('bookReader').style.display = "none";
            document.getElementById('pdfFrame').src = "";
        }
    </script>
</body>
</html>
