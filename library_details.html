<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Library - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --dark-bg: #0c0c14; --card-bg: #1a1a2e; }
        body { background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: #fff; margin: 0; padding: 10px; }
        
        h1 { text-align: center; color: var(--gold); font-size: 24px; margin: 15px 0; font-weight: 950; text-transform: uppercase; letter-spacing: 2px; }

        /* मुख्य ग्रिड: एक लाइन में 2 किताबें (मोबाइल पर), ताकि 6 किताबें आराम से दिखें */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* एक लाइन में 2 डब्बे */
            gap: 12px;
            padding: 10px;
        }

        .book-card {
            background: var(--card-bg);
            border: 1.5px solid var(--gold);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            /* 9:16 का अनुपात बनाने के लिए */
            aspect-ratio: 9 / 16; 
            display: flex;
            flex-direction: column;
        }

        .book-img {
            width: 100%;
            height: 80%; /* फोटो को ज्यादा जगह दी गई है */
            object-fit: cover;
            border-bottom: 1px solid var(--gold);
        }

        .book-info {
            padding: 8px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .book-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--gold);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* नाम बड़ा हो तो ... आ जाएगा */
        }

        .donor-name {
            font-size: 10px;
            color: #ddd;
            margin-top: 4px;
        }

        .book-code {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.7);
            color: var(--gold);
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>The Royal Library 🚩</h1>

    <div class="library-grid" id="libraryGrid">
        </div>

    <script>
        // डेटाबेस: जब भी नई किताब आए, बस इस लिस्ट में बढ़ा देना
        const libraryData = [
            { title: "Rajasthan History", donor: "Sanjay Dhakar", img: "https://via.placeholder.com/900x1600", code: "SST-001" },
            { title: "Psychology", donor: "Rahul S.", img: "https://via.placeholder.com/900x1600", code: "SST-002" },
            { title: "Geography", donor: "Anil Kumar", img: "https://via.placeholder.com/900x1600", code: "SST-003" },
            { title: "Hindi Sahitya", donor: "Priya Singh", img: "https://via.placeholder.com/900x1600", code: "SST-004" },
            { title: "Polity", donor: "Vikram", img: "https://via.placeholder.com/900x1600", code: "SST-005" },
            { title: "Economics", donor: "Suresh", img: "https://via.placeholder.com/900x1600", code: "SST-006" }
        ];

        const grid = document.getElementById('libraryGrid');

        // लिस्ट को डिस्प्ले करने का फंक्शन
        libraryData.forEach(book => {
            grid.innerHTML += `
                <div class="book-card">
                    <div class="book-code">${book.code}</div>
                    <img src="${book.img}" class="book-img" alt="${book.title}">
                    <div class="book-info">
                        <p class="book-title">${book.title}</p>
                        <p class="donor-name">By: ${book.donor}</p>
                    </div>
                </div>
            `;
        });
    </script>

</body>
</html>
