<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST Pro - Royal Library</title>
    <style>
        :root { --gold: #ffd700; --dark: #000; --royal: #1a1a2e; }
        body { background-color: #fdfae5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; color: var(--royal); }
        
        /* 🚩 VVIP लाइब्रेरी हेडर */
        .lib-header {
            background: linear-gradient(180deg, var(--royal) 0%, #000 100%);
            padding: 60px 20px; text-align: center; border-bottom: 8px solid var(--gold); color: var(--gold);
        }

        .container { padding: 20px; max-width: 800px; margin: auto; }

        /* 🔍 सर्च और फ़िल्टर */
        .search-box {
            background: #fff; padding: 15px; border-radius: 20px;
            display: flex; gap: 10px; margin-top: -30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-input { width: 100%; border: none; font-weight: 700; font-size: 16px; outline: none; padding-left: 10px; }

        /* 📚 बुक शेल्फ (Grid) */
        .book-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px; margin-top: 40px;
        }

        .book-card {
            background: #fff; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 2px solid transparent;
            transition: 0.3s; position: relative;
        }
        .book-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .book-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        
        .book-info { padding: 12px; }
        .book-tag { 
            background: var(--gold); color: var(--dark); font-size: 10px; 
            font-weight: 900; padding: 4px 8px; border-radius: 5px; text-transform: uppercase;
        }
        .book-title { font-size: 16px; font-weight: 900; margin: 8px 0 4px 0; color: var(--royal); }
        .book-code { font-size: 12px; font-weight: 700; color: #e67e22; }

        .status-badge {
            position: absolute; top: 10px; right: 10px;
            padding: 5px 10px; border-radius: 10px; font-size: 10px; font-weight: 900;
        }
        .available { background: #25D366; color: #fff; }
        .issued { background: #e74c3c; color: #fff; }

        /* 🔗 एक्शन बटन */
        .claim-btn {
            display: block; background: var(--royal); color: var(--gold);
            text-align: center; padding: 15px; margin-top: 30px;
            border-radius: 20px; text-decoration: none; font-weight: 950;
            box-shadow: 0 10px 20px rgba(26,26,46,0.2);
        }
    </style>
</head>
<body>

    <div class="lib-header">
        <h1 style="margin: 0; font-size: 35px; font-weight: 950;">THE ROYAL LIBRARY</h1>
        <p style="font-weight: 800; color: #fff; margin-top: 5px;">किताबें जो इतिहास बदलेंगी 🚩</p>
    </div>

    <div class="container">
        
        <div class="search-box">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="किताब का नाम या एग्जाम ढूंढें...">
        </div>

        <div class="book-grid">
            
            <div class="book-card">
                <span class="status-badge available">AVAILABLE</span>
                <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=400" class="book-img">
                <div class="book-info">
                    <span class="book-tag">REET / SSC</span>
                    <div class="book-title">SST Pro History</div>
                    <div class="book-code">Code: #SST-001</div>
                </div>
            </div>

            <div class="book-card">
                <span class="status-badge issued">ISSUED</span>
                <img src="https://images.unsplash.com/photo-1589998059171-988d887df646?q=80&w=400" class="book-img">
                <div class="book-info">
                    <span class="book-tag">Boards 10th</span>
                    <div class="book-title">NCERT Social Science</div>
                    <div class="book-code">Code: #SST-002</div>
                </div>
            </div>

            </div>

        <a href="donor_details.html" class="claim-btn">
            पसंद आई? विरासत के लिए अप्लाई करें ❯
        </a>

        <p style="text-align: center; font-size: 12px; font-weight: 700; color: #666; margin-top: 20px;">
            नोट: उपलब्ध किताबें पहले आओ-पहले पाओ के आधार पर दी जाती हैं।
        </p>

    </div>

</body>
</html>
