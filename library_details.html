<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Library - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; }
        body { background: var(--dark); font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        
        header { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(255,215,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 22px; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        .library-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .book-card { 
            background: var(--royal); 
            border-radius: 15px; 
            border: 1px solid rgba(255,215,0,0.15); 
            overflow: hidden; 
            position: relative; 
            cursor: pointer; 
            transition: 0.3s ease;
        }
        .book-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        .book-img { width: 100%; height: 170px; object-fit: cover; }
        
        .photo-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.8); color: var(--gold); padding: 3px 7px; border-radius: 6px; font-size: 9px; font-weight: bold; border: 1px solid var(--gold); }
        .price-badge { position: absolute; top: 8px; right: 8px; padding: 3px 7px; border-radius: 6px; font-size: 9px; font-weight: 900; }
        .is-free { background: #28a745; color: #fff; }
        .is-paid { background: var(--gold); color: #000; }

        .info-box { padding: 10px; text-align: left; }
        .title { font-size: 13px; font-weight: bold; color: var(--gold); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 10px; color: #bbb; margin-top: 5px; }

        #sliderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { width: 92%; max-width: 400px; text-align: center; position: relative; }
        .slide-img { width: 100%; max-height: 60vh; border-radius: 15px; object-fit: contain; box-shadow: 0 0 30px rgba(255,215,0,0.2); }
        
        .nav { position: absolute; top: 40%; background: var(--gold); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .prev { left: -10px; } .next { right: -10px; }
        .close-x { position: absolute; top: -50px; right: 0; color: #fff; font-size: 40px; cursor: pointer; }
        
        .purchase-btn { 
            background: var(--gold); color: #000; text-decoration: none; 
            padding: 15px 30px; border-radius: 50px; margin-top: 25px; 
            font-weight: 900; display: inline-block; width: 85%; font-size: 16px;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>THE ROYAL LIBRARY 🚩</h1>
    </header>

    <div class="library-grid" id="mainGrid"></div>

    <div id="sliderModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeSlider()">&times;</span>
            <button class="nav prev" onclick="moveSlide(-1)">❮</button>
            <img id="activeImg" class="slide-img">
            <button class="nav next" onclick="moveSlide(1)">❯</button>
            
            <h3 id="activeTitle" style="color:var(--gold); margin: 20px 0 5px 0;"></h3>
            <p id="activeDonor" style="font-size:13px; color:#ccc; margin-bottom: 20px;"></p>
            
            <a id="purchaseLink" href="#" class="purchase-btn">अभी प्राप्त करें ❯</a>
        </div>
    </div>

<script>
    const cloudName = "dppmrodwf"; 
    const tag = "sst_pro"; 
    let albumImages = [];
    let albumIndex = 0;

    // 🚩 सुधार: यहाँ हमने फाइल का नाम GitHub के हिसाब से 'donor_details.html' कर दिया है
    const requestFormFile = "donor_details.html"; 

    async function loadBooks() {
        try {
            const response = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json?cb=${Date.now()}`);
            const data = await response.json();
            const grouped = {}; 

            data.resources.forEach(img => {
                const ctx = img.context ? img.context.custom : {};
                const sid = ctx.setid || img.public_id; 
                if (!grouped[sid]) {
                    grouped[sid] = {
                        title: ctx.title || "Untitled Book",
                        donor: ctx.donor || "SST Member",
                        price: ctx.price || 0,
                        images: []
                    };
                }
                grouped[sid].images.push(`https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}`);
            });

            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";

            Object.values(grouped).forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.onclick = () => openSlider(book.images, book.title, book.donor);
                card.innerHTML = `
                    <div class="photo-badge">📸 ${book.images.length}</div>
                    <div class="price-badge ${book.price == 0 ? 'is-free' : 'is-paid'}">
                        ${book.price == 0 ? 'FREE' : '₹' + book.price}
                    </div>
                    <img src="${book.images[0]}" class="book-img">
                    <div class="info-box">
                        <p class="title">${book.title}</p>
                        <p class="meta">दाता: ${book.donor}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch (e) { console.error("Loading Error", e); }
    }

    function openSlider(imgs, title, donor) {
        albumImages = imgs;
        albumIndex = 0;
        document.getElementById('activeImg').src = albumImages[0];
        document.getElementById('activeTitle').innerText = title;
        document.getElementById('activeDonor').innerText = "दाता: " + donor;
        
        // अब यह लिंक सही फाइल को खोलेगा
        document.getElementById('purchaseLink').href = `${requestFormFile}?book=${encodeURIComponent(title)}&donor=${encodeURIComponent(donor)}`;
        
        document.getElementById('sliderModal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; 
    }

    function moveSlide(step) {
        albumIndex += step;
        if (albumIndex >= albumImages.length) albumIndex = 0;
        if (albumIndex < 0) albumIndex = albumImages.length - 1;
        document.getElementById('activeImg').src = albumImages[albumIndex];
    }

    function closeSlider() {
        document.getElementById('sliderModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    loadBooks();
</script>
</body>
</html>
