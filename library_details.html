<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Royal Library - SST Pro</title>
    <style>
        :root { --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; --white: #ffffff; }
        body { background: var(--dark); font-family: 'Poppins', sans-serif; color: var(--white); margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background: linear-gradient(180deg, var(--royal) 0%, var(--dark) 100%);
            text-align: center; padding: 25px 10px; border-bottom: 4px solid var(--gold); 
        }
        h1 { color: var(--gold); font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .stats { font-size: 12px; color: #bbb; margin-top: 8px; font-weight: bold; }

        .search-container { padding: 15px; max-width: 600px; margin: 0 auto; }
        #searchBox { 
            width: 100%; padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,215,0,0.3);
            background: #161625; color: white; outline: none; font-size: 14px; box-sizing: border-box;
        }

        .library-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; padding: 15px; max-width: 1200px; margin: 0 auto; 
        }

        .book-card { 
            background: var(--royal); border-radius: 15px; border: 1px solid rgba(255,215,0,0.1); 
            overflow: hidden; position: relative; cursor: pointer; transition: 0.3s;
        }
        .book-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        
        .book-img { width: 100%; height: 180px; object-fit: cover; }
        
        .photo-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: var(--gold); padding: 3px 6px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .price-badge { position: absolute; top: 8px; right: 8px; padding: 3px 6px; border-radius: 5px; font-size: 10px; font-weight: 900; }
        .is-free { background: #28a745; color: #fff; }
        .is-paid { background: var(--gold); color: #000; }

        .info-box { padding: 10px; }
        .title { font-size: 13px; font-weight: bold; color: var(--gold); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 11px; color: #aaa; margin-top: 4px; }

        /* स्लाइडर */
        #sliderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 400px; text-align: center; position: relative; }
        .slide-img { width: 100%; max-height: 55vh; border-radius: 15px; object-fit: contain; }
        
        .nav { position: absolute; top: 45%; background: var(--gold); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .prev { left: -10px; } .next { right: -10px; }
        .close-x { position: absolute; top: -50px; right: 0; color: #fff; font-size: 40px; cursor: pointer; }
        
        .purchase-btn { 
            background: var(--gold); color: #000; text-decoration: none; 
            padding: 15px; border-radius: 50px; margin-top: 20px; 
            font-weight: 900; display: block; font-size: 16px;
        }

        /* गोला/Loader */
        .loader { border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>THE ROYAL LIBRARY 🚩</h1>
        <div class="stats" id="bookCount">जांच की जा रही है...</div>
    </header>

    <div class="search-container">
        <input type="text" id="searchBox" placeholder="किताब का नाम खोजें..." oninput="filterBooks()">
    </div>

    <div id="loader" class="loader"></div>
    <div class="library-grid" id="mainGrid"></div>

    <div id="sliderModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeSlider()">&times;</span>
            <button class="nav prev" onclick="moveSlide(-1)">❮</button>
            <img id="activeImg" class="slide-img">
            <button class="nav next" onclick="moveSlide(1)">❯</button>
            <h3 id="activeTitle" style="color:var(--gold); margin: 20px 0 5px 0;"></h3>
            <p id="activeDonor" style="font-size:13px; color:#bbb; margin-bottom: 20px;"></p>
            <a id="purchaseLink" href="#" class="purchase-btn">अभी प्राप्त करें ❯</a>
        </div>
    </div>

<script>
    const cloudName = "dppmrodwf"; 
    const tag = "sst_pro"; 
    let allBooks = []; 
    let albumImages = [];
    let albumIndex = 0;
    const requestFormFile = "legacy-builder.html"; 

    async function loadBooks() {
        const loader = document.getElementById('loader');
        const countText = document.getElementById('bookCount');
        
        try {
            const response = await fetch(`https://res.cloudinary.com/${cloudName}/image/list/${tag}.json?cb=${Date.now()}`);
            
            if (!response.ok) throw new Error("No Data");

            const data = await response.json();
            const grouped = {}; 

            if (!data.resources || data.resources.length === 0) {
                showEmpty("अभी कोई किताब उपलब्ध नहीं है।");
                return;
            }

            data.resources.forEach(img => {
                const ctx = img.context ? img.context.custom : {};
                const sid = ctx.setid || img.public_id; 
                if (!grouped[sid]) {
                    grouped[sid] = {
                        title: ctx.title || "Untitled Book",
                        donor: ctx.donor || "SST Member",
                        price: ctx.price || 0,
                        images: []
                    };
                }
                grouped[sid].images.push(`https://res.cloudinary.com/${cloudName}/image/upload/${img.public_id}.${img.format}`);
            });

            allBooks = Object.values(grouped);
            loader.style.display = 'none';
            countText.innerText = `${allBooks.length} किताबें उपलब्ध हैं`;
            displayBooks(allBooks);

        } catch (e) { 
            showEmpty("अभी लाइब्रेरी खाली है 🚩");
        }
    }

    function showEmpty(msg) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('bookCount').innerText = msg;
        document.getElementById('mainGrid').innerHTML = `<p style="text-align:center; width:100%; color:#666;">${msg}</p>`;
    }

    function displayBooks(books) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        books.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openSlider(book.images, book.title, book.donor);
            card.innerHTML = `
                <div class="photo-badge">📸 ${book.images.length}</div>
                <div class="price-badge ${book.price == 0 ? 'is-free' : 'is-paid'}">
                    ${book.price == 0 ? 'FREE' : '₹' + book.price}
                </div>
                <img src="${book.images[0]}" class="book-img">
                <div class="info-box">
                    <p class="title">${book.title}</p>
                    <p class="meta">दाता: ${book.donor}</p>
                </div>`;
            grid.appendChild(card);
        });
    }

    function filterBooks() {
        const term = document.getElementById('searchBox').value.toLowerCase();
        const filtered = allBooks.filter(b => b.title.toLowerCase().includes(term) || b.donor.toLowerCase().includes(term));
        displayBooks(filtered);
    }

    function openSlider(imgs, title, donor) {
        albumImages = imgs; albumIndex = 0;
        document.getElementById('activeImg').src = albumImages[0];
        document.getElementById('activeTitle').innerText = title;
        document.getElementById('activeDonor').innerText = "दाता: " + donor;
        document.getElementById('purchaseLink').href = `${requestFormFile}?book=${encodeURIComponent(title)}&donor=${encodeURIComponent(donor)}`;
        document.getElementById('sliderModal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; 
    }

    function moveSlide(step) {
        albumIndex += step;
        if (albumIndex >= albumImages.length) albumIndex = 0;
        if (albumIndex < 0) albumIndex = albumImages.length - 1;
        document.getElementById('activeImg').src = albumImages[albumIndex];
    }

    function closeSlider() {
        document.getElementById('sliderModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    loadBooks();
</script>
</body>
</html>
