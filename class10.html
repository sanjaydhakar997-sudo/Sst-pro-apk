<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 10th Hub | Sanjay Dhakar Sir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); 
            color: #1e293b; 
            padding-bottom: 60px; 
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* प्रीमियम डिजिटल हेडर */
        .app-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 30px 20px;
            border-radius: 32px;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 25px;
            border-bottom: 6px solid #090d16;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.3);
            position: relative;
        }
        
        /* ⬅️ हेडर के अंदर सुंदर बैक बटन */
        .header-back-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .header-back-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }

        .app-header h1 { font-size: 24px; font-weight: 900; color: #ffffff; }
        .app-header p { font-size: 11px; color: #94a3b8; font-weight: 700; margin-top: 4px; letter-spacing: 1px; }

        .section-title {
            font-size: 16px;
            font-weight: 900;
            color: #1e3a8a;
            margin: 10px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, #1e3a8a, transparent); }

        /* 📑 विषयों का 2-कॉलम (Grid) फोल्डर डिज़ाइन */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .subject-card {
            background: #ffffff;
            padding: 22px 15px;
            border-radius: 24px;
            text-decoration: none;
            color: #0f172a;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* विषय के हिसाब से प्रीमियम 3D बॉर्डर्स */
        .b-eng { border-bottom: 6px solid #6366f1; }
        .b-sst { border-bottom: 6px solid #ef4444; }
        .b-sci { border-bottom: 6px solid #10b981; }
        .b-mat { border-bottom: 6px solid #ec4899; }
        .b-hin { border-bottom: 6px solid #f59e0b; }
        .b-san { border-bottom: 6px solid #14b8a6; }

        .subject-card:active {
            transform: translateY(5px);
            border-bottom-width: 2px;
        }

        .subject-card h3 { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
        .subject-card p { font-size: 11px; color: #64748b; font-weight: 700; line-height: 1.3; }

        .back-home-link {
            display: block; text-align: center; margin-top: 40px;
            color: #64748b; font-size: 13px; font-weight: 700; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="app-header">
            <a href="index.html" class="header-back-btn">⬅</a>
            <h1>कक्षा 10 - संकल्प बैच</h1>
            <p>BY SANJAY DHAKAR SIR</p>
        </div>

        <h2 class="section-title">📚 अपना विषय चुनें</h2>

        <div class="subject-grid">
            
            <a href="class10-english.html" class="subject-card b-eng">
                <h3 style="color: #4338ca;">🇬🇧 English</h3>
                <p>किताबें और व्याकरण</p>
            </a>

            <a href="class10-sst.html" class="subject-card b-sst">
                <h3 style="color: #b91c1c;">🌳 SST</h3>
                <p>संपूर्ण सामाजिक विज्ञान</p>
            </a>

            <a href="class10-science.html" class="subject-card b-sci">
                <h3 style="color: #047857;">🔬 Science</h3>
                <p>विज्ञान के बेस्ट नोट्स</p>
            </a>

            <a href="class10-maths.html" class="subject-card b-mat">
                <h3 style="color: #be185d;">📐 Maths</h3>
                <p>सॉल्यूशन और सूत्र शीट</p>
            </a>

            <a href="class10-hindi.html" class="subject-card b-hin">
                <h3 style="color: #d97706;">✍️ Hindi</h3>
                <p>पाठ्यपुस्तक और व्याकरण</p>
            </a>

            <a href="class10-sanskrit.html" class="subject-card b-san">
                <h3 style="color: #0f766e;">🕉️ Sanskrit</h3>
                <p>संपूर्ण संस्कृत कोर्स</p>
            </a>

        </div>

        <a href="index.html" class="back-home-link">⬅️ मुख्य होम पेज पर वापस जाएं</a>
    </div>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
