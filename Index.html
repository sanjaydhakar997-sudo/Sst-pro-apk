<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Social Studies Classes</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffc107; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); overflow-x: hidden; }
        
        /* Premium Header */
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Animation Section Button */
        .geo-btn { 
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); 
            padding: 25px; border-radius: 20px; text-align: center; color: #000;
            font-weight: bold; font-size: 18px; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4); border: none; width: 100%;
        }

        /* Grid for Other Buttons */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: white; padding: 25px 10px; border-radius: 20px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
        }
        .card:active { background: #e2e8f0; }
        .icon { font-size: 32px; margin-bottom: 8px; display: block; }
        .title { font-size: 14px; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>

<div class="header">
    <h1>Social Studies Classes</h1>
    <p>SST की दुनिया में आपका स्वागत है</p>
</div>

<div class="container">
    <button class="geo-btn" onclick="alert('Geography Animation: Coming Soon!')">
        🌍 GEOGRAPHY ANIMATION
    </button>

    <div class="grid">
        <div class="card" onclick="alert('Full Classes Loading...')">
            <span class="icon">📖</span>
            <span class="title">Full Classes</span>
        </div>
        <div class="card" onclick="alert('Notes Loading...')">
            <span class="icon">📝</span>
            <span class="title">PDF Notes</span>
        </div>
        <div class="card" onclick="alert('Quiz Loading...')">
            <span class="icon">🏆</span>
            <span class="title">Daily Quiz</span>
        </div>
        <div class="card" onclick="alert('History Loading...')">
            <span class="icon">🏛️</span>
            <span class="title">History Master</span>
        </div>
    </div>
</div>

<footer style="text-align: center; margin: 30px 0; color: #94a3b8; font-size: 12px;">
    App Version 1.0 (PRO)
</footer>

</body>
</html>
