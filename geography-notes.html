<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC/RAS जुलाई ह्यूमिडिटी नोट्स</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: #333;
        }

        .map-wrapper {
            position: relative;
            margin: 20px auto;
            border: 2px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        /* भारत का मुख्य मैप */
        .map-bg {
            width: 100%;
            height: auto;
            display: block;
        }

        /* इंडेक्स बॉक्स */
        .humidity-legend {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 150px;
            height: auto;
            border: 1px solid #aaa;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 4px;
        }

        /* एनिमेशन ज़ोन (मैप के ऊपर पारदर्शी लेयर्स) */
        .zone {
            position: absolute;
            opacity: 0.6;
            cursor: pointer;
            transition: transform 0.3s, opacity 0.3s;
        }

        .zone:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* 1. पश्चिमी घाट (गहरा हरा) */
        .zone-wg {
            top: 30%;
            left: 15%;
            width: 15%;
            height: 40%;
            background: #2e8b57; /* SeaGreen */
            animation: pulseWG 2s infinite;
        }

        /* 2. बंगाल की खाड़ी (हरा) */
        .zone-bob {
            top: 25%;
            left: 60%;
            width: 25%;
            height: 35%;
            background: #66cdaa; /* MediumAquaMarine */
        }

        /* 3. उत्तर-पश्चिम भारत (पीला-सूखा) */
        .zone-nw {
            top: 15%;
            left: 20%;
            width: 20%;
            height: 25%;
            background: #fffacd; /* LemonChiffon */
        }

        /* 4. तमिलनाडु (रेन शैडो - पीला) */
        .zone-tn {
            top: 70%;
            left: 30%;
            width: 15%;
            height: 20%;
            background: #fffacd; /* LemonChiffon */
        }

        /* एनिमेशन */
        @keyframes pulseWG {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* नोट्स सेक्शन */
        .notes-section {
            margin-top: 30px;
        }

        .notes-card {
            background: #eef7f2;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #2e8b57;
            border-radius: 4px;
        }

        .notes-card h3 {
            margin-top: 0;
            color: #2e8b57;
        }

    </style>
</head>
<body>
