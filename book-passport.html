<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - ज्ञान पासपोर्ट</title>
    <style>
        :root { --main: #1a3a5f; --gold: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* पासपोर्ट कार्ड का डिजाइन */
        .passport-card {
            width: 350px; background: var(--main); border-radius: 20px; padding: 25px; color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 2px solid var(--gold); position: relative; overflow: hidden;
        }

        /* अशोक स्तंभ की हल्की छाप (Background) */
        .passport-card::before {
            content: "SST"; position: absolute; font-size: 150px; opacity: 0.05; right: -20px; bottom: -20px; color: white;
        }

        .header { text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 18px; letter-spacing: 2px; color: var(--gold); }
        .header p { margin: 5px 0 0; font-size: 10px; opacity: 0.8; text-transform: uppercase; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .label { font-size: 10px; color: var(--gold); text-transform: uppercase; display: block; }
        .value { font-size: 16px; font-weight: bold; }

        /* वह खास विचार (The Quote) */
        .quote-box {
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border-left: 4px solid var(--gold);
            margin: 20px 0; font-style: italic; position: relative;
        }
        .quote-text { font-size: 13px; line-height: 1.5; text-align: center; color: #fff; }

        .footer { text-align: center; font-size: 11px; margin-top: 20px; border-top: 1px dotted rgba(255,255,255,0.3); padding-top: 15px; }
        .signature { font-family: 'cursive'; font-size: 14px; color: var(--gold); margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="passport-card">
    <div class="header">
        <h2>KNOWLEDGE PASSPORT</h2>
        <p>Team Social Studies Classes</p>
    </div>

    <div class="info-row">
        <div>
            <span class="label">धारक का नाम / NAME</span>
            <span class="value" id="dispName">पंजीकृत छात्र</span>
        </div>
        <div style="text-align: right;">
            <span class="label">ID NO.</span>
            <span class="value">SST-2026-001</span>
        </div>
    </div>

    <div class="quote-box">
        <p class="quote-text">
            "उठो, जागो और तब तक मत रुको, जब तक लक्ष्य की प्राप्ति न हो जाए।"<br>
            <span style="font-size: 10px; float: right; margin-top: 5px;">— स्वामी विवेकानंद</span>
        </p>
    </div>

    <div class="footer">
        <span>यह पासपोर्ट ज्ञान की अनंत यात्रा का प्रमाण है।</span>
        <span class="signature">Sanjay Dhakar (Ground Executive)</span>
    </div>
</div>

</body>
</html>
