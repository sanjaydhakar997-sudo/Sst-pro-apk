<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Builder 🚩 - Social Studies Classes</title>
    <style>
        /* 🎨 प्रीमियम थीम कलर्स */
        :root { 
            --gold: #ffd700; --royal: #1a1a2e; --dark: #0c0c14; 
            --white: #ffffff; --glass: rgba(255, 255, 255, 0.05);
            --success: #2ecc71;
        }

        body { 
            background: var(--dark); font-family: 'Poppins', sans-serif; 
            margin: 0; color: var(--white); display: flex; 
            flex-direction: column; align-items: center; padding: 20px; 
            box-sizing: border-box; min-height: 100vh;
        }

        /* 🚩 मुख्य कार्ड स्टाइल */
        .card { 
            background: var(--royal); padding: 45px 30px; border-radius: 40px; 
            border: 2px solid var(--gold); width: 100%; max-width: 480px; 
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.9); 
            position: relative; overflow: hidden; 
        }

        /* टॉप रिबन */
        .trust-banner { 
            background: var(--gold); color: #000; font-size: 11px; 
            font-weight: 900; padding: 10px 0; position: absolute; 
            top: 0; left: 0; width: 100%; text-transform: uppercase; 
            letter-spacing: 2px;
        }

        h1 { color: var(--gold); font-size: 32px; margin-top: 30px; margin-bottom: 5px; }
        .sub-tag { font-size: 13px; color: #ccc; margin-bottom: 30px; font-style: italic; }

        /* 📑 फॉर्म इनपुट्स */
        .input-group { text-align: left; margin-bottom: 22px; }
        .label-text { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; padding-left: 5px; }

        input, select, textarea { 
            width: 100%; padding: 16px; border-radius: 15px; 
            border: 1px solid rgba(255, 215, 0, 0.15); 
            background: #1e1e3a; color: white; box-sizing: border-box; 
            outline: none; font-size: 15px; transition: 0.3s; 
        }

        input:focus, textarea:focus { border-color: var(--gold); background: #25254d; }
        
        /* ऑटो-फिल फील्ड के लिए विशेष स्टाइल */
        .readonly-field { background: rgba(255, 215, 0, 0.05); border: 1px solid var(--gold); color: var(--gold); font-weight: 800; cursor: not-allowed; }

        /* 📜 शपथ और सूचना बॉक्स */
        .special-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 20px; border-radius: 20px; margin-top: 10px;
        }
        .oath-item { display: flex; align-items: flex-start; gap: 12px; font-size: 13px; text-align: left; margin-bottom: 12px; line-height: 1.5; }
        .oath-item input { width: 22px; height: 22px; accent-color: var(--gold); cursor: pointer; margin: 0; }

        /* 🚀 मुख्य बटन */
        .btn { 
            background: var(--gold); color: #000; width: 100%; padding: 20px; 
            border-radius: 60px; font-weight: 900; border: none; font-size: 18px; 
            cursor: pointer; margin-top: 20px; box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2); 
            text-transform: uppercase; transition: 0.3s;
        }

        footer { margin-top: 40px; text-align: center; border-top: 1px solid rgba(255,215,0,0.1); width: 100%; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="trust-banner">विरासत संरक्षण • SOCIAL STUDIES CLASSES</div>
        <h1>LEGACY BUILDER 🚩</h1>
        <p class="sub-tag">"किताब नहीं, अपना कल चुनें"</p>

        <div class="input-group">
            <label class="label-text">1. आपकी जानकारी</label>
            <input type="text" id="reqName" placeholder="आपका पूरा नाम *">
            <input type="tel" id="reqPhone" placeholder="WhatsApp नंबर *" style="margin-top: 12px;">
            <select id="reqExam" style="margin-top: 12px;">
                <option value="" disabled selected>तैयारी का लक्ष्य? *</option>
                <option value="Boards (10/12)">Boards (10th/12th)</option>
                <option value="REET / Teacher">REET / शिक्षक भर्ती</option>
                <option value="Police / CET">Police / CET / LDC</option>
                <option value="Other Govt Exams">अन्य प्रतियोगी परीक्षाएं</option>
            </select>
        </div>

        <div class="input-group">
            <label class="label-text">2. चुनी गई किताब</label>
            <input type="text" id="reqBook" class="readonly-field" readonly placeholder="किताब का नाम">
            <input type="text" id="reqDonor" class="readonly-field" readonly placeholder="दाता का नाम" style="margin-top: 12px;">
        </div>

        <div class="input-group">
            <label class="label-text">3. डिलीवरी का पता</label>
            <textarea id="reqAddress" placeholder="पूरा पता: गांव/शहर, तहसील, जिला, पिनकोड *" rows="3"></textarea>
            <div class="special-box" style="margin-top: 12px; padding: 15px; border-color: var(--gold);">
                <p style="font-size: 12px; color: var(--gold); font-weight: 800; margin: 0 0 5px 0;">📦 शिपिंग शुल्क:</p>
                <p style="font-size: 13px; margin: 0;">"मैं कूरियर चार्ज (Pay on Delivery) खुशी-खुशी दूंगा।"</p>
            </div>
        </div>

        <div class="input-group">
            <label class="label-text">4. विरासत की शपथ</label>
            <div class="special-box">
                <label class="oath-item">
                    <input type="checkbox" id="oath1">
                    <span>मैं इस किताब को बहुत संभाल कर रखूँगा।</span>
                </label>
                <label class="oath-item">
                    <input type="checkbox" id="oath2">
                    <span><b>काम होने पर, इसे वापस "Social Studies Classes" को ही लौटाऊंगा।</b></span>
                </label>
            </div>
        </div>

        <button onclick="sendLegacyRequest()" class="btn" id="reqBtn">रिक्वेस्ट भेजें ❯</button>
        <p id="statusMsg" style="font-size: 11px; color: #aaa; margin-top: 20px; font-weight: 600;"></p>
    </div>

    <footer>
        <p style="font-size: 11px; color: var(--gold); font-weight: bold; margin: 0;">© 2024-25 SST PRO APK</p>
    </footer>
        <script>
        // 📥 लाइब्रेरी से किताब और दाता का नाम अपने आप भरना
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            // अगर URL में 'book' है तो उसे बॉक्स में डालें
            if(params.has('book')) {
                document.getElementById('reqBook').value = params.get('book');
            }
            // अगर URL में 'donor' है तो उसे बॉक्स में डालें
            if(params.has('donor')) {
                document.getElementById('reqDonor').value = params.get('donor');
            }
        };

        // 🚀 व्हाट्सएप पर रिक्वेस्ट भेजने का मुख्य फंक्शन
        async function sendLegacyRequest() {
            // फॉर्म से जानकारी इकट्ठा करना
            const name = document.getElementById('reqName').value;
            const phone = document.getElementById('reqPhone').value;
            const exam = document.getElementById('reqExam').value;
            const book = document.getElementById('reqBook').value;
            const donor = document.getElementById('reqDonor').value;
            const address = document.getElementById('reqAddress').value;
            const o1 = document.getElementById('oath1').checked;
            const o2 = document.getElementById('oath2').checked;

            // ⚠️ कड़ा वैलिडेशन (चेकिंग)
            if(!name || !phone || !address || !exam) {
                alert("🚩 श्रीमान, कृपया अपना नाम, नंबर और पता पूरा भरें!");
                return;
            }
            
            // शपथ की जांच
            if(!o1 || !o2) {
                alert("📜 कृपया संस्था (SST PRO) के प्रति दोनों शपथ स्वीकार करें!");
                return;
            }

            const btn = document.getElementById('reqBtn');
            const status = document.getElementById('statusMsg');

            // बटन को लॉक करना ताकि बार-बार क्लिक न हो
            btn.disabled = true;
            btn.innerText = "अर्जी तैयार हो रही है...";
            status.innerText = "⏳ व्हाट्सएप पर सुरक्षित रूप से भेजा जा रहा है...";

            // 📲 साफ़-सुथरा व्हाट्सएप मैसेज तैयार करना (No Technical Junk)
            const waMsg = `🚩 *नई किताब रिक्वेस्ट: एक नई शुरुआत!*\n\n` +
                          `👤 *छात्र:* ${name}\n` +
                          `📞 *व्हाट्सएप:* ${phone}\n` +
                          `🎓 *लक्ष्य:* ${exam}\n\n` +
                          `📚 *किताब:* ${book}\n` +
                          `🤝 *दाता:* ${donor}\n\n` +
                          `📍 *पता:* ${address}\n` +
                          `🚚 *शिपिंग:* मैं कूरियर चार्ज (Pay on Delivery) वहन करूँगा।\n\n` +
                          `📜 *मेरी प्रतिज्ञा:* "संजय सर, मैं शपथ लेता हूँ कि लक्ष्य पूरा होने पर इस किताब को वापस *Social Studies Classes* में ही जमा कराऊंगा ताकि किसी और का भला हो सके।"\n\n` +
                          `_SST PRO - सेवा ही संकल्प_`;

            // छोटा सा डिले ताकि यूजर को लगे कि काम हो रहा है
            setTimeout(() => {
                // आपके नंबर (919529812784) पर भेजना
                window.location.assign(`https://wa.me/919529812784?text=${encodeURIComponent(waMsg)}`);
            }, 800);
        }
        </script>
            <footer>
        <p style="font-size: 11px; color: var(--gold); font-weight: bold; margin: 0; letter-spacing: 1px;">
            © 2024-25 SST PRO APK - शिक्षा दान, महादान 🚩
        </p>
        <p style="font-size: 9px; color: #555; margin-top: 8px;">
            Designed with Pride by Social Studies Classes
        </p>
    </footer>

    <script>
        window.onload = function() {
            // पुराने URL पैरामीटर वाला काम (जो चरण 2 में था)
            const params = new URLSearchParams(window.location.search);
            if(params.has('book')) document.getElementById('reqBook').value = params.get('book');
            if(params.has('donor')) document.getElementById('reqDonor').value = params.get('donor');
            
            // फोकस पहले इनपुट पर
            document.getElementById('reqName').focus();
        };
    </script>

</body>
</html>
