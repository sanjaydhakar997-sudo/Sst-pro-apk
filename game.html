<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sanjay Sir - 500 Level Master Mission</title>
    <style>
        body { background: #070a13; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .game-box { background: #1e1b4b; padding: 30px; border-radius: 20px; border: 2px solid #8b5cf6; }
        #level-display { font-size: 24px; color: #fbbf24; font-weight: bold; }
        .btn { background: #10b981; padding: 15px 30px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="game-box">
        <h1>🚀 500 LEVEL MASTER MISSION</h1>
        <div id="level-display">Level: 1</div>
        <p id="task-text">Mission: Noun (नाम) पहचानो!</p>
        <div id="options"></div>
        <button class="btn" onclick="nextLevel()">अगला मिशन (Next Level)</button>
    </div>

    <script>
        let level = 1;

        function nextLevel() {
            if(level < 500) {
                level++;
                document.getElementById('level-display').innerText = "Level: " + level;
                updateMission();
            } else {
                alert("बधाई हो! आपने 500 लेवल का इतिहास रच दिया है!");
            }
        }

        function updateMission() {
            const task = document.getElementById('task-text');
            // यहाँ 500 लेवल का लॉजिक काम करेगा
            if(level <= 50) {
                task.innerText = "Level " + level + ": बेसिक Noun और नाम पहचानें।";
            } else if(level <= 200) {
                task.innerText = "Level " + level + ": अब विज्ञान और गणित के पहेलियाँ सुलझाएं।";
            } else {
                task.innerText = "Level " + level + ": एडवांस कोडिंग और सोशल स्ट्रैटेजी मिशन।";
            }
        }
    </script>
</body>
</html>
