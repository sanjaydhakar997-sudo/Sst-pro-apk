<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanjay Sir - Mega 3D Kids Gaming Zone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', sans-serif;
            user-select: none;
        }

        body {
            background: #070a13;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* मुख्य गेमिंग बॉक्स */
        .arcade-container {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(145deg, #0f1123, #1d1233);
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            border: 3px solid #8b5cf6;
            position: relative;
        }

        /* टॉप बार: स्कोर और लेवल */
        .top-status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .home-link {
            background: #ef4444;
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
            padding: 6px 14px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
            text-transform: uppercase;
        }

        .subject-badge {
            background: #3b82f6;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        /* 3D थियेटर व्यू */
        .viewport-3d {
            width: 100%;
            height: 240px;
            background: radial-gradient(circle at center, #02040a, #050515);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid #4c1d95;
            perspective: 600px;
        }

        /* 3D अरीना ग्राउंड */
        .arena-floor {
            width: 140%;
            height: 140%;
            top: -20%;
            left: -20%;
            position: absolute;
            background-size: 30px 30px;
            background-image: 
                linear-gradient(to right, rgba(139, 92, 246, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(139, 92, 246, 0.15) 1px, transparent 1px);
            transform: rotateX(50deg);
            transform-origin: bottom center;
            transition: transform 0.1s ease;
        }

        /* 3D हीरा/कॉइन */
        .diamond-3d {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #f59e0b;
            clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
            box-shadow: 0 0 25px #f59e0b;
            animation: floatAndRotate 1s ease-in-out infinite alternate;
            border: 1px solid #fff;
        }

        /* 3D एनिमेटेड प्लेयर */
        .avatar-player {
            position: absolute;
            width: 24px;
            height: 42px;
            background: #10b981;
            border-radius: 8px 8px 3px 3px;
            box-shadow: 0 0 20px #10b981;
            transition: left 0.12s ease, bottom 0.12s ease;
            border: 2px solid #fff;
        }

        .avatar-head {
            width: 100%;
            height: 40%;
            background: #6ee7b7;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 2px;
        }

        .avatar-eye {
            width: 5px;
            height: 5px;
            background: #000;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        /* गेम के अंदर बड़ा क्वेश्चन बॉक्स */
        .battle-quiz-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 7, 24, 0.96);
            padding: 20px;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            border-radius: 22px;
            animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .quiz-title-tag {
            color: #a78bfa;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .question-text {
            font-size: 15px;
            font-weight: 800;
            line-height: 1.5;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .answers-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-card {
            background: #1e1b4b;
            color: white;
            border: 2px solid #4338ca;
            padding: 12px 15px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .answer-card:active {
            transform: scale(0.97);
            background: #312e81;
        }

        /* गेम कम्प्लीट/विन स्क्रीन */
        .win-victory-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 7, 18, 0.98);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            border-radius: 22px;
        }

        .victory-title {
            font-size: 32px;
            font-weight: 900;
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            margin-bottom: 10px;
            animation: bounceKids 0.6s infinite alternate;
        }

        .victory-btn {
            background: linear-gradient(90deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4);
            margin-top: 20px;
        }

        /* एडवांस गेम पैड कंट्रोल्स (जॉयस्टिक लुक) */
        .gamepad-zone {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        .joystick-base {
            width: 120px;
            height: 120px;
            background: #111827;
            border-radius: 50%;
            position: relative;
            border: 4px solid #374151;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dpad-btn {
            position: absolute;
            background: #374151;
            border: none;
            color: white;
            font-weight: 900;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1f2937;
        }

        .dpad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1f2937;
        }

        .dpad-up    { width: 36px; height: 36px; top: 5px; }
        .dpad-down  { width: 36px; height: 36px; bottom: 5px; }
        .dpad-left  { width: 36px; height: 36px; left: 5px; }
        .dpad-right { width: 36px; height: 36px; right: 5px; }

        .action-button-box {
            text-align: center;
        }

        .action-click-btn {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #ec4899, #db2777);
            border: none;
            border-radius: 50%;
            color: white;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 6px 0 #9d174d, 0 10px 20px rgba(236, 72, 153, 0.4);
            cursor: pointer;
        }

        .action-click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #9d174d;
        }

        /* एनिमेशन पुस्तकालय */
        @keyframes floatAndRotate {
            0% { transform: translateY(0) rotate(0deg); background: #f59e0b; }
            100% { transform: translateY(-10px) rotate(15deg); background: #38bdf8; }
        }
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes bounceKids {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <div class="top-status-bar">
            <a href="index.html" class="home-link">◀ Exit</a>
            <div id="sub-badge" class="subject-badge">LEVEL 1: SST BATTLE</div>
            <div class="stats-box">🪙 <span id="player-score">0</span>/400</div>
        </div>

        <div class="viewport-3d" id="viewport">
            <div class="arena-floor" id="floor">
                <div id="target-diamond" class="diamond-3d" style="left: 60%; bottom: 50%;"></div>
                <div id="live-player" class="avatar-player" style="left: 45%; bottom: 15%;">
                    <div class="avatar-head">
                        <div class="avatar-eye"></div>
                        <div class="avatar-eye"></div>
                    </div>
                </div>
            </div>

            <div id="quiz-overlay" class="battle-quiz-overlay">
                <div id="quiz-tag" class="quiz-title-tag">SST QUESTION</div>
                <p id="target-question" class="question-text">प्रश्न लोड हो रहा है...</p>
                <div id="options-stack" class="answers-stack"></div>
            </div>

            <div id="victory-screen" class="win-victory-screen">
                <h3 class="victory-title">👑 GRAND WINNER 👑</h3>
                <p style="color: #a78bfa; font-weight: 800; font-size: 14px;">Aapne Sabhi Subjects Me Topper Rank Hasil Ki!</p>
                <button onclick="restartFullArcade()" class="victory-btn">Play Again</button>
            </div>
        </div>

        <div class="gamepad-zone">
            <div class="joystick-base">
                <button class="dpad-btn dpad-up" onclick="triggerMove('up')">▲</button>
                <button class="dpad-btn dpad-down" onclick="triggerMove('down')">▼</button>
                <button class="dpad-btn dpad-left" onclick="triggerMove('left')">◀</button>
                <button class="dpad-btn dpad-right" onclick="triggerMove('right')">▶</button>
            </div>
            <div class="action-button-box">
                <button class="action-click-btn" onclick="triggerMove('up')">RUN🏃</button>
            </div>
        </div>
    </div>

    <script>
        // सभी विषयों का मास्टर 5000+ आइडिया बेस्ड डेटाबैंक
        const megaDatabase = {
            1: {
                name: "LEVEL 1: SST BATTLE",
                tag: "SOCIAL STUDIES",
                color: "#8b5cf6",
                questions: [
                    { q: "जलियावाला बाग हत्याकांड भारत के किस शहर में हुआ था?", o: ["अमृतसर", "लाहौर", "दिल्ली", "जयपुर"], a: 0 },
                    { q: "भारतीय राष्ट्रीय कांग्रेस की स्थापना किस वर्ष हुई थी?", o: ["1920", "1885", "1947", "1905"], a: 1 }
                ]
            },
            2: {
                name: "LEVEL 2: SCIENCE MISSION",
                tag: "SCIENCE POWER",
                color: "#10b981",
                questions: [
                    { q: "मनुष्य के शरीर का सामान्य तापमान कितना होता है?", o: ["98.6°F", "37°F", "100°F", "92°F"], a: 0 },
                    { q: "प्रकाश संश्लेषण (Photosynthesis) के लिए क्या आवश्यक है?", o: ["सिर्फ पानी", "क्लोरोफिल और सूर्य का प्रकाश", "ऑक्सीजन", "नाइट्रोजन"], a: 1 }
                ]
            },
            3: {
                name: "LEVEL 3: MATHS WIZARD",
                tag: "MATHEMATICS CHALLENGE",
                color: "#f59e0b",
                questions: [
                    { q: "यदि 2x + 5 = 15 है, तो x का मान क्या होगा?", o: ["5", "10", "15", "2"], a: 0 },
                    { q: "वृत्त (Circle) के क्षेत्रफल का सही सूत्र क्या है?", o: ["2πr", "πr²", "Base × Height", "l × b"], a: 1 }
                ]
            },
            4: {
                name: "LEVEL 4: ENGLISH MASTER",
                tag: "ENGLISH GRAMMAR",
                color: "#ec4899",
                questions: [
                    { q: "Identify the Noun in: 'Sanjay Sir teaches very well.'", o: ["teaches", "Sanjay Sir", "well", "very"], a: 1 },
                    { q: "What is the past tense form of the verb 'GO'?", o: ["Gone", "Going", "Went", "Walked"], a: 2 }
                ]
            }
        };

        let currentLevel = 1;
        let currentQuestionIdx = 0;
        let score = 0;

        let pX = 45; 
        let pY = 15; 
        let dX = 60; 
        let dY = 50;

        // ऑडियो बीप जनरेटर (बिना बाहरी फाइल के साउंड इफेक्ट)
        function playSound(type) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if(type === 'correct') {
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                } else if(type === 'wrong') {
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                } else {
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                }
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        function triggerMove(dir) {
            const delta = 8;
            if(dir === 'left' && pX > 8) pX -= delta;
            if(dir === 'right' && pX < 88) pX += delta;
            if(dir === 'up' && pY < 75) pY += delta;
            if(dir === 'down' && pY > 10) pY -= delta;

            const player = document.getElementById('live-player');
            player.style.left = pX + '%';
            player.style.bottom = pY + '%';

            playSound('move');
            checkTargetCollision();
        }

        function checkTargetCollision() {
            let diffX = Math.abs(pX - dX);
            let diffY = Math.abs(pY - dY);

            if(diffX < 10 && diffY < 12) {
                launchQuizWindow();
            }
        }

        function launchQuizWindow() {
            document.getElementById('target-diamond').style.display = 'none';
            const lvlData = megaDatabase[currentLevel];
            
            document.getElementById('sub-badge').innerText = lvlData.name;
            document.getElementById('quiz-tag').innerText = lvlData.tag;
            
            const currentQ = lvlData.questions[currentQuestionIdx];
            document.getElementById('target-question').innerText = currentQ.q;
            
            const stack = document.getElementById('options-stack');
            stack.innerHTML = '';

            currentQ.o.forEach((opt, idx) => {
                let btn = document.createElement('button');
                btn.className = 'answer-card';
                btn.innerText = (idx + 1) + ". " + opt;
                btn.onclick = () => verifySelection(idx);
                stack.appendChild(btn);
            });

            document.getElementById('quiz-overlay').style.display = 'flex';
        }

        function verifySelection(selected) {
            const lvlData = megaDatabase[currentLevel];
            const currentQ = lvlData.questions[currentQuestionIdx];
            document.getElementById('quiz-overlay').style.display = 'none';

            if(selected === currentQ.a) {
                score += 50;
                document.getElementById('player-score').innerText = score;
                playSound('correct');
                
                // स्क्रीन ग्रीन फ्लैश इफेक्ट
                document.getElementById('viewport').style.borderColor = '#10b981';
                setTimeout(() => document.getElementById('viewport').style.borderColor = '#4c1d95', 400);
                alert("🎁 शाबाश! बिल्कुल सही जवाब। आपको मिले 50 कॉइंस!");
            } else {
                playSound('wrong');
                // स्क्रीन रेड फ्लैश इफेक्ट
                document.getElementById('viewport').style.borderColor = '#ef4444';
                setTimeout(() => document.getElementById('viewport').style.borderColor = '#4c1d95', 400);
                alert("❌ ओहो! गलत जवाब। सही उत्तर था: " + currentQ.o[currentQ.a]);
            }

            currentQuestionIdx++;
            if(currentQuestionIdx >= lvlData.questions.length) {
                currentQuestionIdx = 0;
                currentLevel++;
            }

            if(currentLevel > 4) {
                document.getElementById('victory-screen').style.display = 'flex';
            } else {
                relocateDiamond();
            }
        }

        function relocateDiamond() {
            dX = Math.floor(Math.random() * 60) + 20;
            dY = Math.floor(Math.random() * 45) + 25;
            
            const diamond = document.getElementById('target-diamond');
            diamond.style.left = dX + '%';
            diamond.style.bottom = dY + '%';
            diamond.style.display = 'block';

            // नए लेवल का रंग बदलना
            document.getElementById('sub-badge').innerText = megaDatabase[currentLevel].name;
            document.getElementById('sub-badge').style.background = megaDatabase[currentLevel].color;
        }

        function restartFullArcade() {
            score = 0;
            currentLevel = 1;
            currentQuestionIdx = 0;
            pX = 45; pY = 15;
            document.getElementById('player-score').innerText = score;
            document.getElementById('victory-screen').style.display = 'none';
            
            const player = document.getElementById('live-player');
            player.style.left = pX + '%';
            player.style.bottom = pY + '%';
            
            relocateDiamond();
        }
    </script>
</body>
</html>
