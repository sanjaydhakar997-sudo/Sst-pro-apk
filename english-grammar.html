<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 10th English Grammar | Sanjay Dhakar Sir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); 
            color: #1e293b; 
            padding-bottom: 80px;
            user-select: none; /* Text Copy Protection */
        }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* Premium Header */
        .app-header {
            background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 100%);
            padding: 30px 20px; border-radius: 32px; text-align: center;
            margin-top: 15px; margin-bottom: 25px; border-bottom: 6px solid #431407;
            box-shadow: 0 15px 35px rgba(109, 40, 217, 0.25); position: relative;
        }
        
        .header-back-btn {
            position: absolute; top: 15px; left: 20px; color: #ffffff;
            text-decoration: none; font-size: 18px; font-weight: 900;
            background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 12px;
        }

        .app-header h1 { font-size: 24px; font-weight: 900; color: #ffffff; }
        .app-header p { font-size: 11px; color: #ddd6fe; font-weight: 700; margin-top: 4px; letter-spacing: 1px; }

        .section-title {
            font-size: 16px; font-weight: 900; color: #5b21b6;
            margin: 25px 0 15px 0; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, #5b21b6, transparent); }

        /* Topic Card Lists */
        .topics-list { display: flex; flex-direction: column; gap: 15px; }

        .topic-card {
            background: #ffffff; padding: 20px; border-radius: 24px;
            border: 1px solid #e2e8f0; border-bottom: 6px solid #cbd5e1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
        }

        .class-badge {
            position: absolute; top: 0; right: 0; background: #f3e8ff;
            color: #6d28d9; font-size: 10px; font-weight: 800;
            padding: 4px 12px; border-radius: 0 0 0 14px;
        }

        .topic-card h3 { font-size: 16px; font-weight: 800; color: #1e1b4b; padding-right: 50px; }
        .topic-card p { font-size: 12px; color: #64748b; font-weight: 600; margin-top: 2px; }

        /* Unified Study Button */
        .btn-study {
            width: 100%; margin-top: 15px; padding: 14px;
            border-radius: 16px; background: linear-gradient(135deg, #6d28d9, #4c1d95);
            color: white; font-size: 13px; font-weight: 800; text-align: center;
            cursor: pointer; transition: 0.2s; border: none;
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.2);
        }
        .btn-study:active { transform: scale(0.97); }

        /* 📺 Theater Mode Popup (Split Screen Video + PDF Together) */
        .theater-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 2000; flex-direction: column;
        }

        .theater-control {
            background: #0f172a; padding: 12px 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b;
        }
        .theater-title { color: #ffffff; font-size: 13px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
        .btn-close-theater { background: #ef4444; color: white; padding: 6px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }

        /* Upper Half: YouTube Video */
        .theater-video-box { background: #000000; width: 100%; position: relative; padding-bottom: 56.25%; height: 0; }
        .theater-video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Lower Half: Notes PDF Viewer */
        .theater-pdf-box { flex: 1; background: #1e293b; width: 100%; position: relative; }
        .theater-pdf-box iframe { width: 100%; height: 100%; border: none; }
        
        .no-pdf-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #94a3b8; font-weight: 700; font-size: 14px; text-align: center; width: 90%;
        }

        .back-menu-link { display: block; text-align: center; margin-top: 40px; color: #64748b; font-size: 13px; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-header">
            <a href="class10-english.html" class="header-back-btn">⬅</a>
            <h1>English Grammar</h1>
            <p>SMART STUDY ZONE • BY SANJAY SIR</p>
        </div>

        <h2 class="section-title">📝 डिजिटल क्लासेस (वीडियो + नोट्स साथ में)</h2>

        <div class="topics-list" id="grammar-container"></div>

        <a href="class10-english.html" class="back-menu-link">⬅️ इंग्लिश मेनू पर वापस जाएं</a>
    </div>

    <div class="theater-modal" id="theaterModal">
        <div class="theater-control">
            <div class="theater-title" id="currentTitle">Class Topic</div>
            <div class="btn-close-theater" onclick="closeTheater()">✖️ बंद करें</div>
        </div>
        <div class="theater-video-box">
            <iframe id="theaterVideo" src="" allowfullscreen></iframe>
        </div>
        <div class="theater-pdf-box" id="pdfWrapper"></div>
    </div>

    <script>
        // ====================================================================
        // 🔥 Live Data Bank with Dedicated PDF URL Paths
        // ====================================================================
        const myClassesData = [
            {
                title: "Noun (संज्ञा) - Part 1: Definition & Types",
                desc: "Noun kise kehte hain? Person, Place, Animal aur Thing ko bilkul zero level se samjhein.",
                ytId: "_yeltWMnQQY", 
                pdfUrl: "pdfs/noun_notes.pdf" // GitHub par is path par pdf daal dein
            },
            {
                title: "Noun (संज्ञा) - Part 2: Exercise & Sorting Game",
                desc: "Mazedaar board game ke sath shabdon mein se Person, Place, Animal aur Thing chhantna sikhein.",
                ytId: "rgt9ohZt6cs", 
                pdfUrl: "pdfs/noun_notes.pdf"
            },
            {
                title: "Noun (संज्ञा) - Part 3: Sentence Identification Test",
                desc: "Vakyon mein noun ki pehchan karna aur noun va verb (kriya) ke antar ko samjhein.",
                ytId: "1KCoQHR__oo", 
                pdfUrl: "pdfs/noun_notes.pdf" // Isme poore 3 parts ka master note khulega
            }
        ];
        // ====================================================================

        function loadGrammarClasses() {
            const container = document.getElementById('grammar-container');
            let html = '';

            myClassesData.forEach((item, index) => {
                let classNum = String(index + 1).padStart(2, '0');
                let clickAction = `openTheater('${item.title}', '${item.ytId}', '${item.pdfUrl}')`;
                let btnText = `📖 क्लास देखें + नोट्स पढ़ें`;

                html += `
                    <div class="topic-card">
                        <div class="class-badge">Class ${classNum}</div>
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <button class="btn-study" onclick="${clickAction}">
                            ${btnText}
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openTheater(title, ytId, pdfUrl) {
            document.getElementById('currentTitle').innerText = title;
            document.getElementById('theaterVideo').src = "https://www.youtube.com/embed/" + ytId + "?autoplay=1&rel=0";
            
            const pdfWrapper = document.getElementById('pdfWrapper');
            if(pdfUrl === "" || pdfUrl.includes("your-pdf-link")) {
                pdfWrapper.innerHTML = `<div class="no-pdf-message">📝 Is class ke notes PDF jald hi upload kiye jayenge. Tab tak video se padhai karein! ⏳</div>`;
            } else {
                // PDF display inside the interactive app panel
                pdfWrapper.innerHTML = `<iframe src="${pdfUrl}#toolbar=0&navpanes=0"></iframe>`;
            }

            document.getElementById('theaterModal').style.display = "flex";
            document.body.style.overflow = "hidden";
        }

        function closeTheater() {
            document.getElementById('theaterModal').style.display = "none";
            document.getElementById('theaterVideo').src = "";
            document.getElementById('pdfWrapper').innerHTML = "";
            document.body.style.overflow = "auto";
        }

        window.onload = loadGrammarClasses;
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
