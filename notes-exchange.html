<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST PRO - नोट्स अपलोड सेंटर</title>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
    <style>
        :root { --royal: #1a1a2e; --gold: #ffd700; --dark: #0c0c14; --white: #ffffff; }
        body { background: var(--dark); font-family: 'Poppins', sans-serif; margin: 0; color: #fff; padding: 15px; }

        .royal-header { 
            text-align: center; padding: 40px 20px; 
            background: linear-gradient(180deg, var(--royal) 0%, #000 100%);
            border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; margin-bottom: 30px;
        }
        .main-title { color: var(--gold); font-size: 28px; font-weight: 900; margin: 0; text-transform: uppercase; }

        .upload-section { 
            background: var(--white); color: #333; border-radius: 30px; padding: 25px; 
            max-width: 450px; margin: 0 auto; border-right: 10px solid var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 2px solid #eee; font-weight: 700; box-sizing: border-box; font-size: 14px;
        }

        .file-box {
            border: 2px dashed var(--royal); padding: 30px; border-radius: 20px;
            text-align: center; cursor: pointer; background: #fdfae5; margin-top: 15px;
        }

        .royal-btn { 
            width: 100%; background: var(--royal); color: var(--gold); 
            border: none; padding: 18px; border-radius: 50px; font-size: 18px; 
            font-weight: 900; cursor: pointer; margin-top: 25px; box-shadow: 0 8px 15px rgba(26,26,46,0.3);
        }

        #pLine { width: 0%; height: 6px; background: var(--gold); position: fixed; top: 0; left: 0; transition: 0.3s; z-index: 1000; }

        #successCard { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .pop-up { background: var(--royal); border: 2px solid var(--gold); padding: 40px; border-radius: 40px; text-align: center; color: var(--gold); }
    </style>
</head>
<body>

<div id="pLine"></div>

<div class="royal-header">
    <div style="font-size: 11px; font-weight: 900; background: var(--gold); color: #000; display: inline-block; padding: 2px 15px; border-radius: 20px; margin-bottom: 10px;">STEP 1: UPLOAD NOTES</div>
    <h1 class="main-title">ROYAL LIBRARY 🚩</h1>
</div>

<div class="upload-section">
    <div style="color: var(--royal); font-weight: 900; margin-bottom: 15px;">📝 नोट्स अपलोड करें</div>
    
    <input type="text" id="stdName" placeholder="आपका नाम *">
    <input type="text" id="coaching" placeholder="कोचिंग का नाम (जैसे: उत्कर्ष) *">
    
    <select id="subject">
        <option value="">विषय चुनें (Subject) *</option>
        <option value="History">इतिहास</option>
        <option value="Geography">भूगोल</option>
        <option value="Polity">राजनीति</option>
        <option value="Science">विज्ञान</option>
    </select>

    <label class="file-box">
        <input type="file" id="notePics" accept="image/*" multiple style="display:none;" onchange="updateUI()">
        <div style="font-size: 40px;">📸</div>
        <div id="statusTxt" style="font-weight: 900; color: var(--royal);">नोट्स की फोटो सिलेक्ट करें</div>
    </label>

    <button onclick="transferNotes()" class="royal-btn" id="upBtn">लाइब्रेरी में भेजें ❯</button>
</div>

<div id="successCard">
    <div class="pop-up">
        <h2>🚩 विरासत जमा हुई!</h2>
        <p style="color: #fff;">आपके नोट्स ईमेल पर पहुँच गए हैं।</p>
        <button onclick="location.reload()" style="background:var(--gold); border:none; padding:10px 25px; border-radius:20px; font-weight:900;">OK</button>
    </div>
</div>

<script>
    function updateUI() {
        const count = document.getElementById('notePics').files.length;
        document.getElementById('statusTxt').innerText = `✅ ${count} फोटो तैयार हैं`;
    }

    async function transferNotes() {
        const files = document.getElementById('notePics').files;
        const name = document.getElementById('stdName').value;
        const coach = document.getElementById('coaching').value;
        const sub = document.getElementById('subject').value;

        if(!files.length || !name || !coach || !sub) return alert("सारी जानकारी भरें!");

        const btn = document.getElementById('upBtn');
        const pLine = document.getElementById('pLine');
        btn.disabled = true; btn.innerText = "भेजा जा रहा है...";

        let links = [];

        // फोटो अपलोड (Cloudinary)
        for (let i = 0; i < files.length; i++) {
            const options = { maxSizeMB: 0.5, maxWidthOrHeight: 1200 };
            const comp = await imageCompression(files[i], options);
            const formData = new FormData();
            formData.append('file', comp);
            formData.append('upload_preset', 'sst_pro'); 

            try {
                const resp = await fetch('https://api.cloudinary.com/v1_1/dppmrodwf/image/upload', { method: 'POST', body: formData });
                const res = await resp.json();
                links.push(res.secure_url);
                pLine.style.width = ((i + 1) / files.length * 70) + "%"; 
            } catch (err) { console.error(err); }
        }

        // डेटा ईमेल पर भेजना (Formspree)
        fetch("https://formspree.io/f/xzdyowdw", {
            method: "POST",
            body: JSON.stringify({
                "Mission": "Direct To Student",
                "Donor": name,
                "Coaching": coach,
                "Subject": sub,
                "Photo Links": links.join(" , ")
            }),
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
        }).then(() => {
            pLine.style.width = "100%";
            document.getElementById('successCard').style.display = 'flex';
        });
    }
</script>
</body>
</html>
